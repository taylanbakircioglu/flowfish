name: Build and Push Docker Images

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  DOCKERHUB_REPO: taylanbakircioglu/flowfish

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: backend
            dockerfile: backend/Dockerfile
          - service: frontend
            dockerfile: frontend/Dockerfile.production
          - service: api-gateway
            dockerfile: services/api-gateway/Dockerfile
          - service: ingestion-service
            dockerfile: services/ingestion-service/Dockerfile
          - service: cluster-manager
            dockerfile: services/cluster-manager/Dockerfile
          - service: timeseries-writer
            dockerfile: services/timeseries-writer/Dockerfile
          - service: timeseries-query
            dockerfile: services/timeseries-query/Dockerfile
          - service: graph-writer
            dockerfile: services/graph-writer/Dockerfile
          - service: graph-query
            dockerfile: services/graph-query/Dockerfile
          - service: analysis-orchestrator
            dockerfile: services/analysis-orchestrator/Dockerfile
          - service: change-worker
            dockerfile: backend/Dockerfile.worker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate version tag
        id: version
        run: echo "TAG=$(date +'%Y%m%d.%H%M')-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:${{ matrix.service }}-latest
            ${{ env.DOCKERHUB_REPO }}:${{ matrix.service }}-${{ steps.version.outputs.TAG }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

---
apiVersion: v1
kind: Service
metadata:
  name: analysis-orchestrator
  namespace: flowfish-local
spec:
  type: ClusterIP
  ports:
    - port: 5002
      targetPort: 5002
      name: grpc
  selector:
    app: analysis-orchestrator
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: analysis-orchestrator
  namespace: flowfish-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analysis-orchestrator
  template:
    metadata:
      labels:
        app: analysis-orchestrator
    spec:
      containers:
        - name: analysis-orchestrator
          image: taylanbakircioglu/flowfish:analysis-orchestrator-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: SERVICE_NAME
              value: analysis-orchestrator
            - name: GRPC_PORT
              value: "5002"
            - name: LOG_LEVEL
              value: INFO
            - name: POSTGRES_HOST
              value: postgresql
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              value: flowfish
            - name: POSTGRES_PASSWORD
              value: flowfish123
            - name: POSTGRES_DATABASE
              value: flowfish
            - name: NEO4J_BOLT_URI
              value: bolt://neo4j:7687
            - name: NEO4J_HTTP_URI
              value: http://neo4j:7474
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              value: flowfish123
            - name: NEO4J_DATABASE
              value: neo4j
            - name: CLICKHOUSE_HOST
              value: clickhouse
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              value: flowfish
            - name: CLICKHOUSE_PASSWORD
              value: flowfish123
            - name: CLICKHOUSE_DATABASE
              value: flowfish
            - name: CLUSTER_MANAGER_HOST
              value: cluster-manager
            - name: CLUSTER_MANAGER_PORT
              value: "5001"
            - name: TIMESERIES_QUERY_URL
              value: http://timeseries-query:8002
            - name: GRAPH_QUERY_URL
              value: http://graph-query:8001
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:5002'); ch.close()"
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:5002'); ch.close()"
            initialDelaySeconds: 15
            periodSeconds: 10

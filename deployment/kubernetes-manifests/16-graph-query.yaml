---
apiVersion: v1
kind: Service
metadata:
  name: graph-query
  namespace: flowfish
  labels:
    app: graph-query
    component: query
    tier: microservices
spec:
  selector:
    app: graph-query
  ports:
    - name: http
      port: 8001
      targetPort: 8001
      protocol: TCP
      appProtocol: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-query
  namespace: flowfish
  labels:
    app: graph-query
    component: query
    tier: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: graph-query
  template:
    metadata:
      labels:
        app: graph-query
        component: query
        tier: microservices
    spec:
      serviceAccountName: flowfish
      containers:
        - name: graph-query
          image: taylanbakircioglu/flowfish:graph-query-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "graph-query"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8001"
            - name: LOG_LEVEL
              value: "INFO"
            - name: NEO4J_BOLT_URI
              value: "bolt://neo4j:7687"
            - name: NEO4J_HTTP_URI
              value: "http://neo4j:7474"
            - name: NEO4J_USER
              value: "neo4j"
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: NEO4J_PASSWORD
            - name: NEO4J_DATABASE
              value: "neo4j"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: false


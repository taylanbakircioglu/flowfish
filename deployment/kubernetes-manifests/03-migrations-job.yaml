---
apiVersion: batch/v1
kind: Job
metadata:
  name: flowfish-migrations
  namespace: flowfish
  labels:
    app: flowfish-migrations
spec:
  template:
    metadata:
      labels:
        app: flowfish-migrations
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
      initContainers:
      # Wait for PostgreSQL to be ready
      - name: wait-for-postgres
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for PostgreSQL..."
          until nc -z postgresql 5432; do
            echo "PostgreSQL is unavailable - sleeping"
            sleep 2
          done
          echo "PostgreSQL is up!"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
      
      # Wait for ClickHouse to be ready
      - name: wait-for-clickhouse
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          echo "Waiting for ClickHouse..."
          until nc -z clickhouse 9000; do
            echo "ClickHouse is unavailable - sleeping"
            sleep 2
          done
          echo "ClickHouse is up!"
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
      
      containers:
      # PostgreSQL Migrations
      - name: postgres-migrations
        image: postgres:15-alpine
        command:
        - sh
        - -c
        - |
          echo "========================================="
          echo "PostgreSQL Migrations Starting"
          echo "Production-Ready: Preserves existing data"
          echo "========================================="
          
          export PGPASSWORD="${POSTGRES_PASSWORD}"
          
          # =========================================
          # Migration 001: Schema Version Tracking
          # =========================================
          echo "Setting up migration tracking..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          -- Create migration tracking table
          CREATE TABLE IF NOT EXISTS schema_migrations (
              version INTEGER PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              applied_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          
          EOSQL
          
          # =========================================
          # Migration 004: Clusters Table
          # =========================================
          echo "Running migration 004: Clusters..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          -- Create clusters table if not exists
          CREATE TABLE IF NOT EXISTS clusters (
              id SERIAL PRIMARY KEY,
              name VARCHAR(255) NOT NULL UNIQUE,
              description TEXT,
              environment VARCHAR(50) NOT NULL DEFAULT 'production',
              provider VARCHAR(50) NOT NULL DEFAULT 'openshift',
              region VARCHAR(100),
              tags JSONB DEFAULT '{}',
              connection_type VARCHAR(50) NOT NULL DEFAULT 'in-cluster',
              api_server_url VARCHAR(500) NOT NULL DEFAULT 'https://kubernetes.default.svc',
              kubeconfig_encrypted TEXT,
              ca_cert_encrypted TEXT,
              token_encrypted TEXT,
              skip_tls_verify BOOLEAN DEFAULT FALSE,
              gadget_endpoint VARCHAR(500),  -- Deprecated
              gadget_namespace VARCHAR(255) NOT NULL,  -- REQUIRED: Inspector Gadget namespace (from UI)
              gadget_protocol VARCHAR(50) DEFAULT 'kubectl',
              gadget_auto_detect BOOLEAN DEFAULT TRUE,
              gadget_version VARCHAR(50),
              gadget_capabilities JSONB DEFAULT '[]',
              gadget_health_status VARCHAR(50) DEFAULT 'unknown',
              gadget_last_check TIMESTAMP WITH TIME ZONE,
              status VARCHAR(50) DEFAULT 'active',
              validation_status JSONB,
              last_sync TIMESTAMP WITH TIME ZONE,
              error_message TEXT,
              total_namespaces INTEGER DEFAULT 0,
              total_pods INTEGER DEFAULT 0,
              total_nodes INTEGER DEFAULT 0,
              k8s_version VARCHAR(50),
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              created_by INTEGER,
              updated_by INTEGER
          );
          
          -- Handle legacy cluster_type column (old schema compatibility)
          -- Make it nullable and add default so INSERT without this column works
          DO $BODY$
          BEGIN
              -- If cluster_type exists and is NOT NULL, make it nullable with default
              IF EXISTS (SELECT 1 FROM information_schema.columns 
                        WHERE table_name = 'clusters' AND column_name = 'cluster_type') THEN
                  -- Add default value
                  ALTER TABLE clusters ALTER COLUMN cluster_type SET DEFAULT 'kubernetes';
                  -- Make nullable
                  ALTER TABLE clusters ALTER COLUMN cluster_type DROP NOT NULL;
                  RAISE NOTICE 'cluster_type column updated to nullable with default';
              END IF;
          END $BODY$;
          
          -- Add any missing columns (idempotent)
          DO $BODY$
          BEGIN
              -- Add description if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'description') THEN
                  ALTER TABLE clusters ADD COLUMN description TEXT;
              END IF;
              
              -- Add gadget_protocol if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'gadget_protocol') THEN
                  ALTER TABLE clusters ADD COLUMN gadget_protocol VARCHAR(50) DEFAULT 'grpc';
              END IF;
              
              -- Add gadget_capabilities if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'gadget_capabilities') THEN
                  ALTER TABLE clusters ADD COLUMN gadget_capabilities JSONB DEFAULT '[]';
              END IF;
              
              -- Add gadget_health_status if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'gadget_health_status') THEN
                  ALTER TABLE clusters ADD COLUMN gadget_health_status VARCHAR(50) DEFAULT 'unknown';
              END IF;
              
              -- Add gadget_last_check if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'gadget_last_check') THEN
                  ALTER TABLE clusters ADD COLUMN gadget_last_check TIMESTAMP WITH TIME ZONE;
              END IF;
              
              -- Add total_namespaces if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'total_namespaces') THEN
                  ALTER TABLE clusters ADD COLUMN total_namespaces INTEGER DEFAULT 0;
              END IF;
              
              -- Add total_pods if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'total_pods') THEN
                  ALTER TABLE clusters ADD COLUMN total_pods INTEGER DEFAULT 0;
              END IF;
              
              -- Add total_nodes if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'total_nodes') THEN
                  ALTER TABLE clusters ADD COLUMN total_nodes INTEGER DEFAULT 0;
              END IF;
              
              -- Add k8s_version if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'k8s_version') THEN
                  ALTER TABLE clusters ADD COLUMN k8s_version VARCHAR(50);
              END IF;
              
              -- Add region if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'region') THEN
                  ALTER TABLE clusters ADD COLUMN region VARCHAR(100);
              END IF;
              
              -- Add tags if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'tags') THEN
                  ALTER TABLE clusters ADD COLUMN tags JSONB DEFAULT '{}';
              END IF;
              
              -- Add environment if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'environment') THEN
                  ALTER TABLE clusters ADD COLUMN environment VARCHAR(50) NOT NULL DEFAULT 'production';
              END IF;
              
              -- Add provider if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'provider') THEN
                  ALTER TABLE clusters ADD COLUMN provider VARCHAR(50) NOT NULL DEFAULT 'openshift';
              END IF;
              
              -- Add connection_type if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'connection_type') THEN
                  ALTER TABLE clusters ADD COLUMN connection_type VARCHAR(50) NOT NULL DEFAULT 'in-cluster';
              END IF;
              
              -- Add api_server_url if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'api_server_url') THEN
                  ALTER TABLE clusters ADD COLUMN api_server_url VARCHAR(500) NOT NULL DEFAULT 'https://kubernetes.default.svc';
              END IF;
              
              -- Add skip_tls_verify if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'skip_tls_verify') THEN
                  ALTER TABLE clusters ADD COLUMN skip_tls_verify BOOLEAN DEFAULT FALSE;
              END IF;
              
              -- Add gadget_endpoint if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'gadget_endpoint') THEN
                  ALTER TABLE clusters ADD COLUMN gadget_endpoint VARCHAR(500) NOT NULL DEFAULT 'inspektor-gadget:16060';
              END IF;
              
              -- Add status if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'status') THEN
                  ALTER TABLE clusters ADD COLUMN status VARCHAR(50) DEFAULT 'active';
              END IF;
              
              -- Add kubeconfig_encrypted if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'kubeconfig_encrypted') THEN
                  ALTER TABLE clusters ADD COLUMN kubeconfig_encrypted TEXT;
              END IF;
              
              -- Add ca_cert_encrypted if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'ca_cert_encrypted') THEN
                  ALTER TABLE clusters ADD COLUMN ca_cert_encrypted TEXT;
              END IF;
              
              -- Add token_encrypted if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'token_encrypted') THEN
                  ALTER TABLE clusters ADD COLUMN token_encrypted TEXT;
              END IF;
              
              -- Add validation_status if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'validation_status') THEN
                  ALTER TABLE clusters ADD COLUMN validation_status JSONB;
              END IF;
              
              -- Add last_sync if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'last_sync') THEN
                  ALTER TABLE clusters ADD COLUMN last_sync TIMESTAMP WITH TIME ZONE;
              END IF;
              
              -- Add error_message if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'error_message') THEN
                  ALTER TABLE clusters ADD COLUMN error_message TEXT;
              END IF;
              
              -- Add gadget_auto_detect if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'gadget_auto_detect') THEN
                  ALTER TABLE clusters ADD COLUMN gadget_auto_detect BOOLEAN DEFAULT TRUE;
              END IF;
              
              -- Add gadget_version if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'gadget_version') THEN
                  ALTER TABLE clusters ADD COLUMN gadget_version VARCHAR(50);
              END IF;
              
              -- Add gadget_namespace if missing (REQUIRED for Inspector Gadget configuration)
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'gadget_namespace') THEN
                  ALTER TABLE clusters ADD COLUMN gadget_namespace VARCHAR(255);
              END IF;
              
              -- Update existing clusters: set gadget_namespace based on gadget_endpoint or default
              UPDATE clusters
              SET gadget_namespace = COALESCE(
                  CASE 
                      WHEN gadget_endpoint LIKE '%%.%%.svc%%' THEN 
                          SPLIT_PART(SPLIT_PART(gadget_endpoint, '.', 2), '.', 1)
                      ELSE NULL
                  END,
                  'flowfish'
              )
              WHERE gadget_namespace IS NULL OR gadget_namespace = '';
              
              -- Make gadget_namespace NOT NULL (safe after updating existing rows)
              ALTER TABLE clusters ALTER COLUMN gadget_namespace SET NOT NULL;
              
              -- Add updated_at if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'updated_at') THEN
                  ALTER TABLE clusters ADD COLUMN updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP;
              END IF;
              
              -- Add created_by if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'created_by') THEN
                  ALTER TABLE clusters ADD COLUMN created_by INTEGER;
              END IF;
              
              -- Add updated_by if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'clusters' AND column_name = 'updated_by') THEN
                  ALTER TABLE clusters ADD COLUMN updated_by INTEGER;
              END IF;
          END $BODY$;
          
          -- Create indexes if not exists
          CREATE INDEX IF NOT EXISTS idx_clusters_environment ON clusters(environment);
          CREATE INDEX IF NOT EXISTS idx_clusters_status ON clusters(status);
          CREATE INDEX IF NOT EXISTS idx_clusters_name ON clusters(name);
          
          -- Track migration
          INSERT INTO schema_migrations (version, name) 
          VALUES (4, 'clusters_table')
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 004 completed!"
          
          # =========================================
          # Migration 005: Analysis Event Types
          # =========================================
          echo "Running migration 005: Analysis Event Types..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          CREATE TABLE IF NOT EXISTS analysis_event_types (
              id SERIAL PRIMARY KEY,
              analysis_id INTEGER NOT NULL,
              event_type_id VARCHAR(50) NOT NULL,
              enabled BOOLEAN DEFAULT TRUE,
              sampling_rate INTEGER DEFAULT 100,
              filters JSONB DEFAULT '[]',
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              UNIQUE(analysis_id, event_type_id)
          );
          
          CREATE INDEX IF NOT EXISTS idx_analysis_event_types_analysis_id ON analysis_event_types(analysis_id);
          
          INSERT INTO schema_migrations (version, name) 
          VALUES (5, 'analysis_event_types')
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 005 completed!"
          
          # =========================================
          # Migration 006: Namespaces and Workloads
          # =========================================
          echo "Running migration 006: Namespaces and Workloads..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          CREATE TABLE IF NOT EXISTS namespaces (
              id SERIAL PRIMARY KEY,
              cluster_id INTEGER NOT NULL REFERENCES clusters(id) ON DELETE CASCADE,
              name VARCHAR(255) NOT NULL,
              uid VARCHAR(255),
              labels JSONB DEFAULT '{}',
              annotations JSONB DEFAULT '{}',
              status VARCHAR(50) DEFAULT 'Active',
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              UNIQUE(cluster_id, name)
          );
          
          CREATE INDEX IF NOT EXISTS idx_namespaces_cluster ON namespaces(cluster_id);
          CREATE INDEX IF NOT EXISTS idx_namespaces_name ON namespaces(name);
          CREATE INDEX IF NOT EXISTS idx_namespaces_labels ON namespaces USING gin(labels);
          
          CREATE TABLE IF NOT EXISTS workloads (
              id SERIAL PRIMARY KEY,
              cluster_id INTEGER NOT NULL REFERENCES clusters(id) ON DELETE CASCADE,
              namespace_id INTEGER NOT NULL REFERENCES namespaces(id) ON DELETE CASCADE,
              name VARCHAR(255) NOT NULL,
              workload_type VARCHAR(50) NOT NULL,
              uid VARCHAR(255),
              labels JSONB DEFAULT '{}',
              annotations JSONB DEFAULT '{}',
              replicas INTEGER,
              available_replicas INTEGER,
              image VARCHAR(500),
              status VARCHAR(50) DEFAULT 'Unknown',
              is_active BOOLEAN DEFAULT TRUE,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              UNIQUE(cluster_id, namespace_id, workload_type, name)
          );
          
          -- Add missing columns to workloads table (idempotent)
          DO $BODY$
          BEGIN
              -- Add owner_kind if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'owner_kind') THEN
                  ALTER TABLE workloads ADD COLUMN owner_kind VARCHAR(100);
              END IF;
              
              -- Add owner_name if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'owner_name') THEN
                  ALTER TABLE workloads ADD COLUMN owner_name VARCHAR(255);
              END IF;
              
              -- Add owner_uid if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'owner_uid') THEN
                  ALTER TABLE workloads ADD COLUMN owner_uid VARCHAR(255);
              END IF;
              
              -- Add ip_address if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'ip_address') THEN
                  ALTER TABLE workloads ADD COLUMN ip_address INET;
              END IF;
              
              -- Add ports if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'ports') THEN
                  ALTER TABLE workloads ADD COLUMN ports JSONB DEFAULT '[]';
              END IF;
              
              -- Add containers if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'containers') THEN
                  ALTER TABLE workloads ADD COLUMN containers JSONB DEFAULT '[]';
              END IF;
              
              -- Add node_name if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'node_name') THEN
                  ALTER TABLE workloads ADD COLUMN node_name VARCHAR(255);
              END IF;
              
              -- Add first_seen if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'first_seen') THEN
                  ALTER TABLE workloads ADD COLUMN first_seen TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP;
              END IF;
              
              -- Add last_seen if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'last_seen') THEN
                  ALTER TABLE workloads ADD COLUMN last_seen TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP;
              END IF;
              
              -- Add metadata if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'workloads' AND column_name = 'metadata') THEN
                  ALTER TABLE workloads ADD COLUMN metadata JSONB DEFAULT '{}';
              END IF;
          END $BODY$;
          
          -- Create communications table if not exists
          CREATE TABLE IF NOT EXISTS communications (
              id SERIAL PRIMARY KEY,
              cluster_id INTEGER NOT NULL REFERENCES clusters(id) ON DELETE CASCADE,
              source_namespace_id INTEGER REFERENCES namespaces(id) ON DELETE SET NULL,
              source_workload_id INTEGER REFERENCES workloads(id) ON DELETE SET NULL,
              source_ip INET,
              source_port INTEGER,
              destination_namespace_id INTEGER REFERENCES namespaces(id) ON DELETE SET NULL,
              destination_workload_id INTEGER REFERENCES workloads(id) ON DELETE SET NULL,
              destination_ip INET NOT NULL,
              destination_port INTEGER NOT NULL,
              protocol VARCHAR(50) NOT NULL,
              first_seen TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT CURRENT_TIMESTAMP,
              last_seen TIMESTAMP WITH TIME ZONE NOT NULL DEFAULT CURRENT_TIMESTAMP,
              request_count BIGINT DEFAULT 0,
              request_rate_per_second VARCHAR(10),
              bytes_transferred BIGINT DEFAULT 0,
              avg_latency_ms VARCHAR(10),
              p50_latency_ms VARCHAR(10),
              p95_latency_ms VARCHAR(10),
              p99_latency_ms VARCHAR(10),
              error_count BIGINT DEFAULT 0,
              error_rate VARCHAR(5),
              risk_score INTEGER DEFAULT 0,
              risk_level VARCHAR(20) DEFAULT 'low',
              importance_score INTEGER DEFAULT 0,
              is_cross_namespace BOOLEAN DEFAULT FALSE,
              is_external BOOLEAN DEFAULT FALSE,
              is_active BOOLEAN DEFAULT TRUE,
              metadata JSONB DEFAULT '{}',
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          
          CREATE INDEX IF NOT EXISTS idx_workloads_cluster ON workloads(cluster_id);
          CREATE INDEX IF NOT EXISTS idx_workloads_namespace ON workloads(namespace_id);
          CREATE INDEX IF NOT EXISTS idx_workloads_type ON workloads(workload_type);
          CREATE INDEX IF NOT EXISTS idx_workloads_labels ON workloads USING gin(labels);
          CREATE INDEX IF NOT EXISTS idx_workloads_ip ON workloads(ip_address);
          CREATE INDEX IF NOT EXISTS idx_workloads_is_active ON workloads(is_active);
          
          CREATE INDEX IF NOT EXISTS idx_communications_cluster ON communications(cluster_id);
          CREATE INDEX IF NOT EXISTS idx_communications_source_workload ON communications(source_workload_id);
          CREATE INDEX IF NOT EXISTS idx_communications_dest_workload ON communications(destination_workload_id);
          CREATE INDEX IF NOT EXISTS idx_communications_dest_ip ON communications(destination_ip);
          CREATE INDEX IF NOT EXISTS idx_communications_protocol ON communications(protocol);
          CREATE INDEX IF NOT EXISTS idx_communications_risk_level ON communications(risk_level);
          CREATE INDEX IF NOT EXISTS idx_communications_is_active ON communications(is_active);
          
          INSERT INTO schema_migrations (version, name) 
          VALUES (6, 'namespaces_workloads')
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 006 completed!"
          
          # =========================================
          # Migration 007: Analyses Table
          # =========================================
          echo "Running migration 007: Analyses..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          -- Handle schema migration from old analyses table to new schema
          DO $BODY$
          BEGIN
              -- Check if old schema exists (has analysis_type column but not scope_type)
              IF EXISTS (SELECT 1 FROM information_schema.columns 
                        WHERE table_name = 'analyses' AND column_name = 'analysis_type')
                 AND NOT EXISTS (SELECT 1 FROM information_schema.columns 
                                WHERE table_name = 'analyses' AND column_name = 'scope_type') THEN
                  
                  -- Rename old table to preserve data
                  ALTER TABLE analyses RENAME TO analyses_v1_backup;
                  
                  -- Update schema_migrations to force recreation
                  DELETE FROM schema_migrations WHERE version = 7;
                  
                  RAISE NOTICE 'Old analyses table backed up to analyses_v1_backup';
              END IF;
          END $BODY$;
          
          -- Create analyses table with new schema (includes multi-cluster support)
          CREATE TABLE IF NOT EXISTS analyses (
              id SERIAL PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              description TEXT,
              cluster_id INTEGER NOT NULL REFERENCES clusters(id) ON DELETE CASCADE,
              cluster_ids JSONB DEFAULT '[]',  -- Multi-cluster: all cluster IDs
              is_multi_cluster BOOLEAN DEFAULT FALSE,  -- Multi-cluster flag
              status VARCHAR(50) DEFAULT 'draft',
              scope_type VARCHAR(50) NOT NULL DEFAULT 'cluster',
              scope_config JSONB DEFAULT '{}',
              gadget_config JSONB DEFAULT '{}',
              time_config JSONB DEFAULT '{}',
              output_config JSONB DEFAULT '{}',
              created_by INTEGER,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          
          -- Add missing columns for future schema updates (idempotent)
          DO $BODY$
          BEGIN
              -- Add scope_type if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'scope_type') THEN
                  ALTER TABLE analyses ADD COLUMN scope_type VARCHAR(50) NOT NULL DEFAULT 'cluster';
              END IF;
              
              -- Add scope_config if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'scope_config') THEN
                  ALTER TABLE analyses ADD COLUMN scope_config JSONB DEFAULT '{}';
              END IF;
              
              -- Add gadget_config if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'gadget_config') THEN
                  ALTER TABLE analyses ADD COLUMN gadget_config JSONB DEFAULT '{}';
              END IF;
              
              -- Add gadget_modules if missing (from model)
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'gadget_modules') THEN
                  ALTER TABLE analyses ADD COLUMN gadget_modules JSONB DEFAULT '[]';
              END IF;
              
              -- Add time_config if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'time_config') THEN
                  ALTER TABLE analyses ADD COLUMN time_config JSONB DEFAULT '{}';
              END IF;
              
              -- Add output_config if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'output_config') THEN
                  ALTER TABLE analyses ADD COLUMN output_config JSONB DEFAULT '{}';
              END IF;
              
              -- Add is_active if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'is_active') THEN
                  ALTER TABLE analyses ADD COLUMN is_active BOOLEAN DEFAULT TRUE;
              END IF;
              
              -- Add metadata if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'metadata') THEN
                  ALTER TABLE analyses ADD COLUMN metadata JSONB DEFAULT '{}';
              END IF;
              
              -- =====================================================
              -- MULTI-CLUSTER SUPPORT (Sprint 5-6)
              -- =====================================================
              
              -- Add cluster_ids for multi-cluster analysis
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'cluster_ids') THEN
                  ALTER TABLE analyses ADD COLUMN cluster_ids JSONB DEFAULT '[]';
              END IF;
              
              -- Add is_multi_cluster flag
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'is_multi_cluster') THEN
                  ALTER TABLE analyses ADD COLUMN is_multi_cluster BOOLEAN DEFAULT FALSE;
              END IF;
              
              -- =====================================================
              -- AUTO-STOP TIMING FIELDS (for Fixed Duration analyses)
              -- =====================================================
              
              -- Add started_at for tracking when analysis started running
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'started_at') THEN
                  ALTER TABLE analyses ADD COLUMN started_at TIMESTAMP WITH TIME ZONE;
              END IF;
              
              -- Add stopped_at for tracking when analysis stopped
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'stopped_at') THEN
                  ALTER TABLE analyses ADD COLUMN stopped_at TIMESTAMP WITH TIME ZONE;
              END IF;
              
              -- Add change_detection_enabled for optional change detection feature
              -- Default: TRUE (enabled) - recommended for production environments
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'change_detection_enabled') THEN
                  ALTER TABLE analyses ADD COLUMN change_detection_enabled BOOLEAN NOT NULL DEFAULT TRUE;
              END IF;
              
              -- =====================================================
              -- CHANGE DETECTION SUPPORT (Sprint 7+)
              -- =====================================================
              
              -- Add namespaces column for namespace-scoped change detection
              -- Stores the list of namespaces being monitored for this analysis
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'namespaces') THEN
                  ALTER TABLE analyses ADD COLUMN namespaces JSONB;
              END IF;
              
              -- Add change_detection_strategy for detection algorithm selection
              -- Options: 'baseline', 'rolling_window', 'run_comparison'
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'change_detection_strategy') THEN
                  ALTER TABLE analyses ADD COLUMN change_detection_strategy VARCHAR(50) DEFAULT 'baseline';
              END IF;
              
              -- Add change_detection_types for filtering which change types to detect
              -- Default: ["all"] - detect all types; can be specific like ["replica_changed", "connection_added"]
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analyses' AND column_name = 'change_detection_types') THEN
                  ALTER TABLE analyses ADD COLUMN change_detection_types JSONB DEFAULT '["all"]'::jsonb;
              END IF;
          END $BODY$;
          
          -- =====================================================
          -- BACKWARD COMPATIBILITY: Populate multi-cluster fields
          -- These updates are IDEMPOTENT and safe to run multiple times
          -- They only update rows that haven't been migrated yet
          -- =====================================================
          
          -- Populate cluster_ids for existing single-cluster analyses
          -- Only updates if cluster_ids is empty (not already populated)
          UPDATE analyses 
          SET cluster_ids = jsonb_build_array(cluster_id) 
          WHERE (cluster_ids IS NULL OR cluster_ids = '[]'::jsonb)
            AND cluster_id IS NOT NULL;
          
          -- Set is_multi_cluster=FALSE for existing analyses (single-cluster by definition)
          -- Only updates if is_multi_cluster is NULL (not already set)
          UPDATE analyses 
          SET is_multi_cluster = FALSE 
          WHERE is_multi_cluster IS NULL;
          
          -- Create indexes for multi-cluster queries
          CREATE INDEX IF NOT EXISTS idx_analyses_is_multi_cluster ON analyses(is_multi_cluster);
          CREATE INDEX IF NOT EXISTS idx_analyses_cluster_ids ON analyses USING GIN(cluster_ids);
          
          -- =====================================================
          -- BACKWARD COMPATIBILITY: Populate namespaces from scope_config
          -- For existing analyses that have namespace scope defined
          -- Handles multiple formats:
          -- 1. Direct namespaces array: scope_config.namespaces
          -- 2. Per-cluster scope: scope_config.per_cluster_scope.{cluster_id}.namespaces
          -- =====================================================
          
          -- Method 1: Populate namespaces directly from scope_config.namespaces
          UPDATE analyses
          SET namespaces = scope_config->'namespaces'
          WHERE namespaces IS NULL 
            AND scope_config IS NOT NULL 
            AND scope_config->'namespaces' IS NOT NULL
            AND jsonb_typeof(scope_config->'namespaces') = 'array'
            AND jsonb_array_length(scope_config->'namespaces') > 0;
          
          -- Method 2: Extract namespaces from per_cluster_scope for multi-cluster analyses
          -- This collects all namespaces from all clusters into a single array
          UPDATE analyses a
          SET namespaces = (
              SELECT jsonb_agg(DISTINCT ns)
              FROM (
                  SELECT jsonb_array_elements_text(value->'namespaces') as ns
                  FROM jsonb_each(a.scope_config->'per_cluster_scope')
                  WHERE value->'namespaces' IS NOT NULL
              ) sub
          )
          WHERE a.namespaces IS NULL
            AND a.scope_config IS NOT NULL
            AND a.scope_config->'per_cluster_scope' IS NOT NULL
            AND jsonb_typeof(a.scope_config->'per_cluster_scope') = 'object';
          
          -- Method 3: For namespace scope_type without explicit namespaces,
          -- try to extract from scope_config if stored differently
          -- Also handles case where 'namespaces' might be stored as array of objects
          UPDATE analyses
          SET namespaces = (
              CASE 
                  WHEN scope_config ? 'selectedNamespaces' THEN scope_config->'selectedNamespaces'
                  WHEN scope_config ? 'namespace' THEN jsonb_build_array(scope_config->>'namespace')
                  ELSE NULL
              END
          )
          WHERE namespaces IS NULL
            AND scope_type = 'namespace'
            AND scope_config IS NOT NULL
            AND (scope_config ? 'selectedNamespaces' OR scope_config ? 'namespace');
          

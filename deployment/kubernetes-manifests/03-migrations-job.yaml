              schedule VARCHAR(20) NOT NULL DEFAULT 'daily',
              filters JSONB DEFAULT '{}',
              recipients JSONB DEFAULT '[]',
              is_enabled BOOLEAN DEFAULT TRUE,
              last_run TIMESTAMP WITH TIME ZONE,
              next_run TIMESTAMP WITH TIME ZONE,
              created_by INTEGER REFERENCES users(id) ON DELETE SET NULL,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          
          CREATE INDEX IF NOT EXISTS idx_scheduled_reports_enabled ON scheduled_reports(is_enabled);
          CREATE INDEX IF NOT EXISTS idx_scheduled_reports_next_run ON scheduled_reports(next_run);
          
          -- Generated reports history table
          CREATE TABLE IF NOT EXISTS generated_reports (
              id SERIAL PRIMARY KEY,
              name VARCHAR(255) NOT NULL,
              report_type VARCHAR(50) NOT NULL,
              format VARCHAR(20) NOT NULL DEFAULT 'csv',
              status VARCHAR(20) NOT NULL DEFAULT 'pending',
              file_size BIGINT,
              file_path TEXT,
              filters JSONB DEFAULT '{}',
              error_message TEXT,
              scheduled_report_id INTEGER REFERENCES scheduled_reports(id) ON DELETE SET NULL,
              generated_by INTEGER REFERENCES users(id) ON DELETE SET NULL,
              started_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
              completed_at TIMESTAMP WITH TIME ZONE,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          
          CREATE INDEX IF NOT EXISTS idx_generated_reports_status ON generated_reports(status);
          CREATE INDEX IF NOT EXISTS idx_generated_reports_type ON generated_reports(report_type);
          CREATE INDEX IF NOT EXISTS idx_generated_reports_created ON generated_reports(created_at);
          
          INSERT INTO schema_migrations (version, name) 
          VALUES (15, 'scheduled_reports')
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 015 completed!"
          
          # =========================================
          # Migration 016: Default Permissions & Role Assignments
          # RBAC system initialization
          # =========================================
          echo "Running migration 016: Default Permissions..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          -- Insert default permissions
          INSERT INTO permissions (resource, action, description) VALUES
              -- Dashboard
              ('dashboard', 'view', 'View dashboard'),
              ('dashboard', 'stats', 'View statistics'),
              -- Analysis
              ('analysis', 'view', 'View analyses'),
              ('analysis', 'create', 'Create analysis'),
              ('analysis', 'start', 'Start/stop analysis'),
              ('analysis', 'delete', 'Delete analysis'),
              -- Clusters
              ('clusters', 'view', 'View clusters'),
              ('clusters', 'create', 'Add clusters'),
              ('clusters', 'edit', 'Edit clusters'),
              ('clusters', 'delete', 'Delete clusters'),
              -- Events
              ('events', 'view', 'View events'),
              ('events', 'export', 'Export events'),
              -- Reports
              ('reports', 'view', 'View reports'),
              ('reports', 'generate', 'Generate reports'),
              ('reports', 'schedule', 'Schedule reports'),
              ('reports', 'history', 'View report history'),
              -- Security
              ('security', 'view', 'View security events'),
              ('security', 'manage', 'Manage security settings'),
              -- Users
              ('users', 'view', 'View users'),
              ('users', 'create', 'Create users'),
              ('users', 'edit', 'Edit users'),
              ('users', 'delete', 'Delete users'),
              -- Roles
              ('roles', 'view', 'View roles'),
              ('roles', 'create', 'Create roles'),
              ('roles', 'edit', 'Edit roles'),
              ('roles', 'delete', 'Delete roles'),
              -- Settings
              ('settings', 'view', 'View settings'),
              ('settings', 'edit', 'Edit settings')
          ON CONFLICT (resource, action) DO NOTHING;
          
          -- Assign ALL permissions to admin role
          INSERT INTO role_permissions (role_id, permission_id)
          SELECT r.id, p.id 
          FROM roles r, permissions p 
          WHERE r.name = 'admin'
          ON CONFLICT (role_id, permission_id) DO NOTHING;
          
          -- Assign view permissions to viewer role
          INSERT INTO role_permissions (role_id, permission_id)
          SELECT r.id, p.id 
          FROM roles r, permissions p 
          WHERE r.name = 'viewer' AND p.action = 'view'
          ON CONFLICT (role_id, permission_id) DO NOTHING;
          
          -- Assign analysis permissions to analyst role
          INSERT INTO role_permissions (role_id, permission_id)
          SELECT r.id, p.id 
          FROM roles r, permissions p 
          WHERE r.name = 'analyst' AND (
              p.action = 'view' OR 
              (p.resource IN ('analysis', 'events', 'reports') AND p.action IN ('create', 'export', 'generate'))
          )
          ON CONFLICT (role_id, permission_id) DO NOTHING;
          
          -- Assign operator permissions to operator role
          INSERT INTO role_permissions (role_id, permission_id)
          SELECT r.id, p.id 
          FROM roles r, permissions p 
          WHERE r.name = 'operator' AND (
              p.action = 'view' OR 
              (p.resource IN ('clusters', 'analysis') AND p.action IN ('create', 'edit', 'start'))
          )
          ON CONFLICT (role_id, permission_id) DO NOTHING;
          
          -- Assign admin role to admin user
          INSERT INTO user_roles (user_id, role_id)
          SELECT u.id, r.id 
          FROM users u, roles r 
          WHERE u.username = 'admin' AND r.name = 'admin'
          ON CONFLICT (user_id, role_id) DO NOTHING;
          
          INSERT INTO schema_migrations (version, name) 
          VALUES (16, 'default_permissions')
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 016 completed!"
          
          # =========================================
          # Migration 017: Activity Logs Table
          # Comprehensive audit trail for all user actions
          # =========================================
          echo "Running migration 017: Activity Logs..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          -- Activity logs table for comprehensive audit trail
          CREATE TABLE IF NOT EXISTS activity_logs (
              id SERIAL PRIMARY KEY,
              user_id INTEGER REFERENCES users(id) ON DELETE SET NULL,
              username VARCHAR(255) NOT NULL,
              action VARCHAR(100) NOT NULL,
              resource_type VARCHAR(50) NOT NULL,
              resource_id VARCHAR(100),
              resource_name VARCHAR(255),
              details JSONB DEFAULT '{}',
              ip_address VARCHAR(45),
              user_agent TEXT,
              status VARCHAR(20) DEFAULT 'success',
              error_message TEXT,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          
          CREATE INDEX IF NOT EXISTS idx_activity_logs_user ON activity_logs(user_id);
          CREATE INDEX IF NOT EXISTS idx_activity_logs_action ON activity_logs(action);
          CREATE INDEX IF NOT EXISTS idx_activity_logs_resource ON activity_logs(resource_type, resource_id);
          CREATE INDEX IF NOT EXISTS idx_activity_logs_created ON activity_logs(created_at DESC);
          CREATE INDEX IF NOT EXISTS idx_activity_logs_username ON activity_logs(username);
          
          -- Add cluster_id and analysis_id columns to generated_reports if missing
          DO $BODY$
          BEGIN
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'generated_reports' AND column_name = 'cluster_id') THEN
                  ALTER TABLE generated_reports ADD COLUMN cluster_id INTEGER REFERENCES clusters(id) ON DELETE SET NULL;
              END IF;
              
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'generated_reports' AND column_name = 'analysis_id') THEN
                  ALTER TABLE generated_reports ADD COLUMN analysis_id INTEGER REFERENCES analyses(id) ON DELETE SET NULL;
              END IF;
              
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'generated_reports' AND column_name = 'namespace') THEN
                  ALTER TABLE generated_reports ADD COLUMN namespace VARCHAR(255);
              END IF;
              
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'generated_reports' AND column_name = 'created_by') THEN
                  ALTER TABLE generated_reports ADD COLUMN created_by INTEGER REFERENCES users(id) ON DELETE SET NULL;
              END IF;
          END $BODY$;
          
          INSERT INTO schema_migrations (version, name) 
          VALUES (17, 'activity_logs')
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 017 completed!"
          
          # =========================================
          # Migration 018: Fix analysis_runs table
          # Ensure run_number column exists (backward compatibility)
          # =========================================
          echo "Running migration 018: Fix analysis_runs..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          -- Ensure analysis_runs table has all required columns
          DO $BODY$
          BEGIN
              -- Add run_number if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'run_number') THEN
                  ALTER TABLE analysis_runs ADD COLUMN run_number INTEGER NOT NULL DEFAULT 1;
                  RAISE NOTICE 'Added run_number column to analysis_runs';
              END IF;
              
              -- Add duration_seconds if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'duration_seconds') THEN
                  ALTER TABLE analysis_runs ADD COLUMN duration_seconds INTEGER;
              END IF;
              
              -- Add events_collected if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'events_collected') THEN
                  ALTER TABLE analysis_runs ADD COLUMN events_collected BIGINT DEFAULT 0;
              END IF;
              
              -- Add workloads_discovered if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'workloads_discovered') THEN
                  ALTER TABLE analysis_runs ADD COLUMN workloads_discovered INTEGER DEFAULT 0;
              END IF;
              
              -- Add communications_discovered if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'communications_discovered') THEN
                  ALTER TABLE analysis_runs ADD COLUMN communications_discovered INTEGER DEFAULT 0;
              END IF;
              
              -- Add anomalies_detected if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'anomalies_detected') THEN
                  ALTER TABLE analysis_runs ADD COLUMN anomalies_detected INTEGER DEFAULT 0;
              END IF;
              
              -- Add changes_detected if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'changes_detected') THEN
                  ALTER TABLE analysis_runs ADD COLUMN changes_detected INTEGER DEFAULT 0;
              END IF;
              
              -- Add error_message if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'error_message') THEN
                  ALTER TABLE analysis_runs ADD COLUMN error_message TEXT;
              END IF;
              
              -- Add logs if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'logs') THEN
                  ALTER TABLE analysis_runs ADD COLUMN logs JSONB DEFAULT '[]';
              END IF;
              
              -- Add metadata if missing
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'analysis_runs' AND column_name = 'metadata') THEN
                  ALTER TABLE analysis_runs ADD COLUMN metadata JSONB DEFAULT '{}';
              END IF;
          END $BODY$;
          
          INSERT INTO schema_migrations (version, name) 
          VALUES (18, 'fix_analysis_runs')
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 018 completed!"
          
          # =========================================
          # Migration 019: Two-Factor Authentication
          # =========================================
          echo "Running migration 019: Two-Factor Authentication..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          -- Add two_factor_enabled column to users table
          DO $BODY$
          BEGIN
              IF NOT EXISTS (SELECT 1 FROM information_schema.columns 
                           WHERE table_name = 'users' AND column_name = 'two_factor_enabled') THEN
                  ALTER TABLE users ADD COLUMN two_factor_enabled BOOLEAN DEFAULT FALSE;
                  RAISE NOTICE 'Added two_factor_enabled column to users';
              END IF;
          END $BODY$;
          
          -- Create two_factor_codes table for storing temporary verification codes
          CREATE TABLE IF NOT EXISTS two_factor_codes (
              id SERIAL PRIMARY KEY,
              user_id INTEGER NOT NULL UNIQUE REFERENCES users(id) ON DELETE CASCADE,
              code VARCHAR(10) NOT NULL,
              expires_at TIMESTAMP WITH TIME ZONE NOT NULL,
              attempts INTEGER DEFAULT 0,
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          
          -- Index for cleanup of expired codes
          CREATE INDEX IF NOT EXISTS idx_two_factor_codes_expires_at ON two_factor_codes(expires_at);
          
          -- Record migration
          INSERT INTO schema_migrations (version, name) 
          VALUES (19, 'two_factor_authentication') 
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 019 completed!"
          
          # =========================================
          # Migration 020: Blast Radius Assessments
          # For CI/CD pipeline integration
          # =========================================
          echo "Running migration 020: Blast Radius Assessments..."
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          
          -- Create blast_radius_assessments table for CI/CD pipeline integration
          CREATE TABLE IF NOT EXISTS blast_radius_assessments (
              id SERIAL PRIMARY KEY,
              assessment_id VARCHAR(50) UNIQUE NOT NULL,
              cluster_id INTEGER NOT NULL REFERENCES clusters(id),
              analysis_id INTEGER REFERENCES analyses(id),
              target VARCHAR(255) NOT NULL,
              namespace VARCHAR(255) NOT NULL DEFAULT 'default',
              change_type VARCHAR(50) NOT NULL,
              risk_score INTEGER NOT NULL CHECK (risk_score >= 0 AND risk_score <= 100),
              risk_level VARCHAR(20) NOT NULL,
              affected_count INTEGER NOT NULL DEFAULT 0,
              triggered_by VARCHAR(255),
              pipeline VARCHAR(255),
              commit_sha VARCHAR(100),
              assessment_data JSONB DEFAULT '{}',
              recommendations JSONB DEFAULT '[]',
              created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
          );
          
          -- Indexes for blast_radius_assessments
          CREATE INDEX IF NOT EXISTS idx_blast_radius_cluster ON blast_radius_assessments(cluster_id);
          CREATE INDEX IF NOT EXISTS idx_blast_radius_analysis ON blast_radius_assessments(analysis_id);
          CREATE INDEX IF NOT EXISTS idx_blast_radius_created ON blast_radius_assessments(created_at DESC);
          CREATE INDEX IF NOT EXISTS idx_blast_radius_risk ON blast_radius_assessments(risk_level);
          CREATE INDEX IF NOT EXISTS idx_blast_radius_target ON blast_radius_assessments(target, namespace);
          
          -- Record migration
          INSERT INTO schema_migrations (version, name) 
          VALUES (20, 'blast_radius_assessments') 
          ON CONFLICT (version) DO NOTHING;
          
          EOSQL
          echo "Migration 020 completed!"
          
          # =========================================
          # Final: Show migration status
          # =========================================
          echo ""
          echo "========================================="
          echo "Migration Status"
          echo "========================================="
          psql -h "${POSTGRES_HOST}" -U "${POSTGRES_USER}" -d "${POSTGRES_DB}" << 'EOSQL'
          SELECT version, name, applied_at FROM schema_migrations ORDER BY version;
          
          -- Show table summary
          SELECT 
              'clusters' as table_name, COUNT(*) as row_count FROM clusters
          UNION ALL SELECT 
              'analyses', COUNT(*) FROM analyses
          UNION ALL SELECT 
              'namespaces', COUNT(*) FROM namespaces
          UNION ALL SELECT 
              'users', COUNT(*) FROM users
          UNION ALL SELECT 
              'roles', COUNT(*) FROM roles
          UNION ALL SELECT 
              'permissions', COUNT(*) FROM permissions
          UNION ALL SELECT 
              'role_permissions', COUNT(*) FROM role_permissions
          UNION ALL SELECT 
              'user_roles', COUNT(*) FROM user_roles
          UNION ALL SELECT 
              'scheduled_reports', COUNT(*) FROM scheduled_reports
          UNION ALL SELECT 
              'generated_reports', COUNT(*) FROM generated_reports
          UNION ALL SELECT 
              'system_settings', COUNT(*) FROM system_settings
          UNION ALL SELECT 
              'notification_hooks', COUNT(*) FROM notification_hooks
          UNION ALL SELECT 
              'activity_logs', COUNT(*) FROM activity_logs
          UNION ALL SELECT 
              'two_factor_codes', COUNT(*) FROM two_factor_codes
          UNION ALL SELECT 
              'blast_radius_assessments', COUNT(*) FROM blast_radius_assessments;
          EOSQL
          
          echo ""
          echo "========================================="
          echo "PostgreSQL Migrations Complete!"
          echo "========================================="
        
        env:
        - name: POSTGRES_HOST
          value: "postgresql"
        - name: POSTGRES_USER
          value: "flowfish"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flowfish-secrets
              key: postgres-password
        - name: POSTGRES_DB
          value: "flowfish"
        
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
      
      # ClickHouse Migrations
      - name: clickhouse-migrations
        image: clickhouse/clickhouse-server:23.8
        env:
        - name: CLICKHOUSE_HOST
          value: "clickhouse"
        - name: CLICKHOUSE_USER
          value: "flowfish"
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flowfish-secrets
              key: clickhouse-password
        # Set to "true" to drop and recreate all tables (TEST ONLY - DATA LOSS!)
        # WARNING: Setting this to "true" will delete ALL event data!
        - name: FORCE_RECREATE_TABLES
          value: "false"
        command:
        - sh
        - -c
        - |
          echo "========================================="
          echo "ClickHouse Migrations Starting"
          echo "========================================="
          
          # Helper function for ClickHouse queries
          ch_query() {
            clickhouse-client --host "${CLICKHOUSE_HOST}" --user "${CLICKHOUSE_USER}" --password "${CLICKHOUSE_PASSWORD}" "$@"
          }
          
          # Create database
          echo "Creating flowfish database..."
          ch_query --query "CREATE DATABASE IF NOT EXISTS flowfish"
          
          # =========================================
          # DROP existing tables if FORCE_RECREATE is set
          # For test environments only!
          # =========================================
          if [ "${FORCE_RECREATE_TABLES}" = "true" ]; then
            echo "FORCE_RECREATE_TABLES is set - dropping existing tables..."
            ch_query --database flowfish --query "DROP TABLE IF EXISTS network_flows"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS dns_queries"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS process_events"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS tcp_lifecycle"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS file_operations"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS capability_checks"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS oom_kills"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS bind_events"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS sni_events"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS mount_events"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS workload_metadata"
            ch_query --database flowfish --query "DROP TABLE IF EXISTS communication_edges"
            echo "All tables dropped!"
          fi
          
          # Create network_flows table (String types for flexibility)
          echo "Creating network_flows table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS network_flows (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              source_namespace String,
              source_pod String,
              source_container String,
              source_node String,
              source_ip String,
              source_port UInt16,
              dest_namespace String,
              dest_pod String,
              dest_container String,
              dest_ip String,
              dest_port UInt16,
              dest_hostname String,
              protocol String DEFAULT 'TCP',
              direction String DEFAULT 'outbound',
              connection_state String,
              bytes_sent UInt64,
              bytes_received UInt64,
              packets_sent UInt32,
              packets_received UInt32,
              duration_ms UInt32,
              latency_ms Float32,
              error_count UInt16,
              retransmit_count UInt16,
              error_type String DEFAULT '',
              source_labels Map(String, String),
              dest_labels Map(String, String),
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, source_pod, dest_pod, dest_port)
          TTL toDateTime(timestamp) + INTERVAL 90 DAY
          "
          
          # Create dns_queries table
          echo "Creating dns_queries table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS dns_queries (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              source_namespace String,
              source_pod String,
              source_container String,
              source_ip String,
              query_name String,
              query_type String DEFAULT 'A',
              query_class String DEFAULT 'IN',
              response_code String DEFAULT 'NOERROR',
              response_ips Array(String),
              response_cnames Array(String),
              response_ttl UInt32,
              latency_ms Float32,
              dns_server_ip String,
              dns_server_port UInt16 DEFAULT 53,
              labels Map(String, String),
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, source_pod, query_name)
          TTL toDateTime(timestamp) + INTERVAL 90 DAY
          "
          
          # Create process_events table
          echo "Creating process_events table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS process_events (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              namespace String,
              pod String,
              container String,
              node String,
              pid UInt32,
              ppid UInt32,
              uid UInt32,
              gid UInt32,
              comm String,
              exe String,
              args Array(String),
              cwd String,
              event_type String DEFAULT 'exec',
              exit_code Int32,
              signal Int32,
              labels Map(String, String),
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, namespace, pod, pid)
          TTL toDateTime(timestamp) + INTERVAL 90 DAY
          "
          
          # Create workload_metadata table
          echo "Creating workload_metadata table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS workload_metadata (
              timestamp DateTime64(3) DEFAULT now64(3),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              namespace String,
              workload_name String,
              workload_type String,
              pod_name String,
              pod_uid String,
              container_name String,
              container_id String,
              node_name String,
              pod_ip String,
              labels Map(String, String),
              annotations Map(String, String),
              owner_kind String,
              owner_name String,
              first_seen DateTime64(3),
              last_seen DateTime64(3),
              event_count UInt64 DEFAULT 1
          ) ENGINE = ReplacingMergeTree(last_seen)
          PARTITION BY toYYYYMM(timestamp)
          ORDER BY (analysis_id, cluster_id, namespace, pod_name)
          TTL toDateTime(timestamp) + INTERVAL 90 DAY
          "
          
          # Create communication_edges table
          echo "Creating communication_edges table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS communication_edges (
              timestamp DateTime64(3) DEFAULT now64(3),
              cluster_id String,
              analysis_id String,
              source_namespace String,
              source_workload String,
              source_pod String,
              dest_namespace String,
              dest_workload String,
              dest_pod String,
              dest_service String,
              dest_port UInt16,
              protocol String,
              total_bytes UInt64,
              total_packets UInt64,
              request_count UInt64,
              avg_latency_ms Float32,
              p99_latency_ms Float32,
              error_count UInt64,
              first_seen DateTime64(3),
              last_seen DateTime64(3)
          ) ENGINE = SummingMergeTree()
          PARTITION BY toYYYYMM(timestamp)
          ORDER BY (analysis_id, cluster_id, source_namespace, source_workload, dest_namespace, dest_workload, dest_port)
          "
          
          # Create tcp_lifecycle table
          echo "Creating tcp_lifecycle table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS tcp_lifecycle (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              source_ip String,
              source_port UInt16,
              dest_ip String,
              dest_port UInt16,
              old_state String DEFAULT 'CLOSED',
              new_state String DEFAULT 'ESTABLISHED',
              source_namespace String,
              source_pod String,
              source_container String,
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, source_ip, dest_ip, dest_port)
          TTL toDateTime(timestamp) + INTERVAL 30 DAY
          "
          
          # Create file_operations table
          echo "Creating file_operations table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS file_operations (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              namespace String,
              pod String,
              container String,
              operation String DEFAULT 'open',
              file_path String,
              file_flags String,
              file_mode UInt32,
              pid UInt32,
              comm String,
              uid UInt32,
              gid UInt32,
              bytes UInt64,
              duration_us UInt32,
              error_code Int32,
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, namespace, pod, file_path)
          TTL toDateTime(timestamp) + INTERVAL 30 DAY
          "
          
          # Create capability_checks table
          echo "Creating capability_checks table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS capability_checks (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              namespace String,
              pod String,
              container String,
              capability String,
              syscall String,
              pid UInt32,
              comm String,
              uid UInt32,
              gid UInt32,
              verdict String DEFAULT 'allowed',
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, namespace, pod, capability)
          TTL toDateTime(timestamp) + INTERVAL 30 DAY
          "
          
          # Create oom_kills table
          echo "Creating oom_kills table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS oom_kills (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              namespace String,
              pod String,
              container String,
              node String,
              pid UInt32,
              comm String,
              memory_limit UInt64,
              memory_usage UInt64,
              memory_pages_total UInt64,
              memory_pages_free UInt64,
              cgroup_path String,
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, namespace, pod)
          TTL toDateTime(timestamp) + INTERVAL 90 DAY
          "
          
          # Create bind_events table
          echo "Creating bind_events table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS bind_events (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              namespace String,
              pod String,
              container String,
              node String,
              bind_addr String,
              bind_port UInt16,
              protocol String DEFAULT 'TCP',
              interface String,
              error_code Int32 DEFAULT 0,
              pid UInt32,
              comm String,
              uid UInt32,
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, namespace, pod, bind_port)
          TTL toDateTime(timestamp) + INTERVAL 90 DAY
          "
          
          # Create sni_events table
          echo "Creating sni_events table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS sni_events (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              namespace String,
              pod String,
              container String,
              sni_name String,
              src_ip String,
              src_port UInt16,
              dst_ip String,
              dst_port UInt16,
              tls_version String,
              cipher_suite String,
              pid UInt32,
              comm String,
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, namespace, sni_name, dst_ip)
          TTL toDateTime(timestamp) + INTERVAL 90 DAY
          "
          
          # Create mount_events table
          echo "Creating mount_events table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS mount_events (
              timestamp DateTime64(3) DEFAULT now64(3),
              event_id String DEFAULT generateUUIDv4(),
              cluster_id String,
              cluster_name String,
              analysis_id String,
              namespace String,
              pod String,
              container String,
              node String,
              operation String DEFAULT 'mount',
              source String,
              target String,
              fs_type String,
              flags String,
              options String,
              error_code Int32 DEFAULT 0,
              pid UInt32,
              comm String,
              event_data_json String
          ) ENGINE = MergeTree()
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (timestamp, cluster_id, namespace, pod, target)
          TTL toDateTime(timestamp) + INTERVAL 90 DAY
          "
          
          # =========================================
          # ADD MISSING COLUMNS TO EXISTING TABLES
          # For backward compatibility with existing deployments
          # These are idempotent (ADD COLUMN IF NOT EXISTS)
          # =========================================
          echo "Adding missing columns to existing tables (backward compatibility)..."
          
          # Add analysis_id column if missing (for multi-analysis filtering)
          ch_query --database flowfish --query "ALTER TABLE network_flows ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE dns_queries ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE tcp_lifecycle ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE process_events ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE file_operations ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE capability_checks ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE oom_kills ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE bind_events ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE sni_events ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE mount_events ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE workload_metadata ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE communication_edges ADD COLUMN IF NOT EXISTS analysis_id String DEFAULT ''" || true
          
          # Add error_type column if missing (for network error classification)
          ch_query --database flowfish --query "ALTER TABLE network_flows ADD COLUMN IF NOT EXISTS error_type String DEFAULT ''" || true
          
          # Add cluster_name column if missing (for display purposes)
          ch_query --database flowfish --query "ALTER TABLE network_flows ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE dns_queries ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE tcp_lifecycle ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE process_events ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE file_operations ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE capability_checks ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE oom_kills ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE bind_events ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE sni_events ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE mount_events ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          ch_query --database flowfish --query "ALTER TABLE workload_metadata ADD COLUMN IF NOT EXISTS cluster_name String DEFAULT ''" || true
          
          echo "Column additions complete!"
          
          # Create indexes for faster analysis_id filtering
          echo "Creating indexes..."
          ch_query --database flowfish --query "ALTER TABLE network_flows ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE dns_queries ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE tcp_lifecycle ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE process_events ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE file_operations ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE capability_checks ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE oom_kills ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE bind_events ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE sni_events ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE mount_events ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE workload_metadata ADD INDEX IF NOT EXISTS idx_analysis_id (analysis_id) TYPE bloom_filter() GRANULARITY 1" || true
          
          # Create indexes for faster cluster_id filtering (multi-cluster support)
          echo "Creating cluster_id indexes for multi-cluster support..."
          ch_query --database flowfish --query "ALTER TABLE network_flows ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE dns_queries ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE tcp_lifecycle ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE process_events ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE file_operations ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE capability_checks ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE oom_kills ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE bind_events ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE sni_events ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE mount_events ADD INDEX IF NOT EXISTS idx_cluster_id (cluster_id) TYPE bloom_filter() GRANULARITY 1" || true
          
          # =========================================
          # CHANGE EVENTS TABLE (for Change Detection)
          # Stores all change events from K8s API and eBPF detection
          # =========================================
          echo "Creating change_events table..."
          ch_query --database flowfish --query "
          CREATE TABLE IF NOT EXISTS change_events (
              timestamp DateTime64(3) DEFAULT now64(3),
              detected_at DateTime64(3),
              event_id UUID DEFAULT generateUUIDv4(),
              cluster_id UInt32,
              cluster_name String DEFAULT '',
              analysis_id String,
              run_id UInt32 DEFAULT 0,
              run_number UInt16 DEFAULT 1,
              change_type LowCardinality(String),
              risk_level LowCardinality(String) DEFAULT 'medium',
              target_name String DEFAULT '',
              target_namespace String DEFAULT '',
              target_type LowCardinality(String) DEFAULT 'workload',
              entity_id UInt64 DEFAULT 0,
              namespace_id Nullable(UInt32),
              before_state String DEFAULT '{}',
              after_state String DEFAULT '{}',
              affected_services UInt16 DEFAULT 0,
              blast_radius UInt16 DEFAULT 0,
              changed_by String DEFAULT 'auto-discovery',
              details String DEFAULT '',
              metadata String DEFAULT '{}'
          ) ENGINE = ReplacingMergeTree(timestamp)
          PARTITION BY toYYYYMMDD(timestamp)
          ORDER BY (analysis_id, run_id, timestamp, event_id)
          SETTINGS index_granularity = 8192
          "
          
          # Create indexes for change_events
          echo "Creating change_events indexes..."
          ch_query --database flowfish --query "ALTER TABLE change_events ADD INDEX IF NOT EXISTS idx_ce_run_id (run_id) TYPE minmax() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE change_events ADD INDEX IF NOT EXISTS idx_ce_change_type (change_type) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE change_events ADD INDEX IF NOT EXISTS idx_ce_risk_level (risk_level) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE change_events ADD INDEX IF NOT EXISTS idx_ce_target_name (target_name) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE change_events ADD INDEX IF NOT EXISTS idx_ce_target_namespace (target_namespace) TYPE bloom_filter() GRANULARITY 1" || true
          ch_query --database flowfish --query "ALTER TABLE change_events ADD INDEX IF NOT EXISTS idx_ce_cluster_id (cluster_id) TYPE minmax() GRANULARITY 1" || true
          
          # Create materialized view for hourly aggregations
          echo "Creating change_events_hourly_mv..."
          ch_query --database flowfish --query "
          CREATE MATERIALIZED VIEW IF NOT EXISTS change_events_hourly_mv
          ENGINE = SummingMergeTree()
          PARTITION BY toYYYYMMDD(hour)
          ORDER BY (analysis_id, run_id, hour, change_type, risk_level)
          AS SELECT
              analysis_id,
              run_id,
              cluster_id,
              toStartOfHour(timestamp) AS hour,
              change_type,
              risk_level,
              count() AS change_count,
              uniq(target_name) AS unique_targets,
              sum(affected_services) AS total_affected
          FROM change_events
          GROUP BY analysis_id, run_id, cluster_id, hour, change_type, risk_level
          "
          
          # Create materialized view for run statistics (full schema with all change types)
          # NOTE: If upgrading from an older version, the DROP+CREATE section below
          # will replace this with the latest schema. For fresh installs, this creates
          # the MV with all change types directly.
          echo "Creating change_events_run_stats_mv..."
          ch_query --database flowfish --query "
          CREATE MATERIALIZED VIEW IF NOT EXISTS change_events_run_stats_mv
          ENGINE = SummingMergeTree()
          ORDER BY (analysis_id, run_id)
          AS SELECT
              analysis_id,
              run_id,
              anyLast(run_number) AS run_number,
              cluster_id,
              count() AS total_changes,
              countIf(risk_level = 'critical') AS critical_count,
              countIf(risk_level = 'high') AS high_count,
              countIf(risk_level = 'medium') AS medium_count,
              countIf(risk_level = 'low') AS low_count,
              countIf(change_type = 'workload_added') AS workloads_added,
              countIf(change_type = 'workload_removed') AS workloads_removed,
              countIf(change_type = 'replica_changed') AS replicas_changed,
              countIf(change_type = 'config_changed') AS configs_changed,
              countIf(change_type = 'image_changed') AS images_changed,
              countIf(change_type = 'label_changed') AS labels_changed,
              countIf(change_type = 'resource_changed') AS resources_changed,
              countIf(change_type = 'env_changed') AS envs_changed,
              countIf(change_type = 'spec_changed') AS specs_changed,
              countIf(change_type = 'service_added') AS services_added,
              countIf(change_type = 'service_removed') AS services_removed,
              countIf(change_type = 'service_port_changed') AS service_ports_changed,
              countIf(change_type = 'service_selector_changed') AS service_selectors_changed,
              countIf(change_type = 'service_type_changed') AS service_types_changed,
              countIf(change_type IN ('network_policy_added','network_policy_removed','network_policy_changed')) AS network_policy_changes,
              countIf(change_type IN ('ingress_added','ingress_removed','ingress_changed')) AS ingress_changes,
              countIf(change_type IN ('route_added','route_removed','route_changed')) AS route_changes,
              countIf(change_type = 'connection_added') AS connections_added,
              countIf(change_type = 'connection_removed') AS connections_removed,
              countIf(change_type = 'port_changed') AS ports_changed,
              countIf(change_type IN ('traffic_anomaly','dns_anomaly','process_anomaly','error_anomaly')) AS anomalies_total,
              countIf(change_type = 'namespace_changed') AS namespaces_changed,
              min(timestamp) AS first_change_at,
              max(timestamp) AS last_change_at
          FROM change_events
          GROUP BY analysis_id, run_id, cluster_id
          "
          
          # Create materialized view for daily summary
          echo "Creating change_events_daily_mv..."
          ch_query --database flowfish --query "
          CREATE MATERIALIZED VIEW IF NOT EXISTS change_events_daily_mv
          ENGINE = SummingMergeTree()
          PARTITION BY toYYYYMM(day)
          ORDER BY (analysis_id, day, cluster_id)
          AS SELECT
              analysis_id,
              cluster_id,
              toDate(timestamp) AS day,
              count() AS total_changes,
              countIf(risk_level = 'critical') AS critical_count,
              countIf(risk_level = 'high') AS high_count,
              uniq(target_name) AS unique_targets,
              uniq(target_namespace) AS unique_namespaces,
              uniq(run_id) AS runs_count
          FROM change_events
          GROUP BY analysis_id, cluster_id, day
          "
          
          # =========================================
          # Recreate run_stats MV with all change types
          # The API now queries base table directly, but
          # MV is kept for dashboard performance.
          # =========================================
          echo "Recreating change_events_run_stats_mv with all change types..."
          ch_query --database flowfish --query "DROP VIEW IF EXISTS change_events_run_stats_mv" || true
          ch_query --database flowfish --query "
          CREATE MATERIALIZED VIEW IF NOT EXISTS change_events_run_stats_mv
          ENGINE = SummingMergeTree()
          ORDER BY (analysis_id, run_id)
          AS SELECT
              analysis_id,
              run_id,
              anyLast(run_number) AS run_number,
              cluster_id,
              count() AS total_changes,
              countIf(risk_level = 'critical') AS critical_count,
              countIf(risk_level = 'high') AS high_count,
              countIf(risk_level = 'medium') AS medium_count,
              countIf(risk_level = 'low') AS low_count,
              -- Legacy / Workload lifecycle
              countIf(change_type = 'workload_added') AS workloads_added,
              countIf(change_type = 'workload_removed') AS workloads_removed,
              -- K8s API - Workload changes
              countIf(change_type = 'replica_changed') AS replicas_changed,
              countIf(change_type = 'config_changed') AS configs_changed,
              countIf(change_type = 'image_changed') AS images_changed,
              countIf(change_type = 'label_changed') AS labels_changed,
              countIf(change_type = 'resource_changed') AS resources_changed,
              countIf(change_type = 'env_changed') AS envs_changed,
              countIf(change_type = 'spec_changed') AS specs_changed,
              -- K8s API - Service changes
              countIf(change_type = 'service_added') AS services_added,
              countIf(change_type = 'service_removed') AS services_removed,
              countIf(change_type = 'service_port_changed') AS service_ports_changed,
              countIf(change_type = 'service_selector_changed') AS service_selectors_changed,
              countIf(change_type = 'service_type_changed') AS service_types_changed,
              -- K8s API - Network / Ingress / Route
              countIf(change_type IN ('network_policy_added','network_policy_removed','network_policy_changed')) AS network_policy_changes,
              countIf(change_type IN ('ingress_added','ingress_removed','ingress_changed')) AS ingress_changes,
              countIf(change_type IN ('route_added','route_removed','route_changed')) AS route_changes,
              -- eBPF - Connections
              countIf(change_type = 'connection_added') AS connections_added,
              countIf(change_type = 'connection_removed') AS connections_removed,
              countIf(change_type = 'port_changed') AS ports_changed,
              -- eBPF - Anomalies
              countIf(change_type IN ('traffic_anomaly','dns_anomaly','process_anomaly','error_anomaly')) AS anomalies_total,
              -- Namespace
              countIf(change_type = 'namespace_changed') AS namespaces_changed,
              min(timestamp) AS first_change_at,
              max(timestamp) AS last_change_at
          FROM change_events
          GROUP BY analysis_id, run_id, cluster_id
          "
          
          echo "========================================="
          echo "ClickHouse Migrations Complete!"
          echo "========================================="
        
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
---

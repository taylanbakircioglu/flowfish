---
# Neo4j ServiceAccount (requires anyuid SCC - grant manually)
# Manual SCC grant command:
# oc adm policy add-scc-to-user anyuid -z flowfish-neo4j -n <namespace>
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flowfish-neo4j
  namespace: {{OPENSHIFT_NAMESPACE}}
  labels:
    app: neo4j
---
# Neo4j Graph Database
# Community Edition - Production Ready for Single Instance
# Requires anyuid SCC (grant manually before deployment):
# oc adm policy add-scc-to-user anyuid -z flowfish-neo4j -n {{OPENSHIFT_NAMESPACE}}
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: {{OPENSHIFT_NAMESPACE}}
  labels:
    app: neo4j
    tier: infrastructure
spec:
  type: ClusterIP
  ports:
  - port: 7474
    targetPort: 7474
    protocol: TCP
    name: http
    appProtocol: http
  - port: 7687
    targetPort: 7687
    protocol: TCP
    name: bolt
    appProtocol: tcp
  selector:
    app: neo4j
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: neo4j
  namespace: {{OPENSHIFT_NAMESPACE}}
  labels:
    app: neo4j
    tier: infrastructure
spec:
  serviceName: neo4j
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
        tier: infrastructure
    spec:
      serviceAccountName: flowfish-neo4j
      enableServiceLinks: false  # Prevent K8s service env vars from conflicting with Neo4j config
      
      # InitContainer for directory setup
      initContainers:
      - name: init-neo4j-dirs
        image: busybox:latest
        command:
        - sh
        - -c
        - |
          # Create required directories
          mkdir -p /data /logs /import /plugins
          echo "Neo4j directories initialized"
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
        - name: neo4j-logs
          mountPath: /logs
      
      containers:
      - name: neo4j
        image: neo4j:5.15-community
        imagePullPolicy: IfNotPresent
        
        ports:
        - containerPort: 7474
          name: http
        - containerPort: 7687
          name: bolt
        
        env:
        # Authentication (Official Neo4j format: username/password)
        - name: NEO4J_AUTH
          valueFrom:
            secretKeyRef:
              name: flowfish-secrets
              key: NEO4J_AUTH
        
        # Memory configuration
        - name: NEO4J_server_memory_heap_initial__size
          value: "512m"
        - name: NEO4J_server_memory_heap_max__size
          value: "2G"
        - name: NEO4J_server_memory_pagecache_size
          value: "1G"
        
        # Server configuration
        - name: NEO4J_server_default__listen__address
          value: "0.0.0.0"
        
        # Accept license
        - name: NEO4J_ACCEPT_LICENSE_AGREEMENT
          value: "yes"
        
        volumeMounts:
        - name: neo4j-data
          mountPath: /data
        - name: neo4j-logs
          mountPath: /logs
        
        resources:
          requests:
            cpu: 500m
            memory: 2Gi
          limits:
            cpu: 2000m
            memory: 4Gi
        
        # Liveness probe: Check if Neo4j is alive
        livenessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 90
          periodSeconds: 20
          timeoutSeconds: 10
          failureThreshold: 5
        
        # Readiness probe: Check if ready for traffic
        readinessProbe:
          httpGet:
            path: /
            port: 7474
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
      
      volumes:
      - name: neo4j-logs
        emptyDir: {}
  
  # PVC for data persistence
  volumeClaimTemplates:
  - metadata:
      name: neo4j-data
      labels:
        app: neo4j
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{STORAGE_CLASS}}
      resources:
        requests:
          storage: 20Gi


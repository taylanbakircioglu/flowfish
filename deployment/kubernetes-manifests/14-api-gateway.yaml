---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: flowfish
  labels:
    app: api-gateway
    component: api-gateway
    tier: microservices
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
      appProtocol: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: flowfish
  labels:
    app: api-gateway
    component: api-gateway
    tier: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        component: api-gateway
        tier: microservices
    spec:
      serviceAccountName: flowfish
      containers:
        - name: api-gateway
          image: taylanbakircioglu/flowfish:api-gateway-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "api-gateway"
            - name: API_VERSION
              value: "v1"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: LOG_LEVEL
              value: "INFO"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: jwt-secret
            - name: POSTGRES_HOST
              value: "postgresql"
            - name: POSTGRES_PORT
              value: "5432"
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: postgres-user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: postgres-password
            - name: POSTGRES_DATABASE
              value: "flowfish"
            - name: CLUSTER_MANAGER_HOST
              value: "cluster-manager"
            - name: CLUSTER_MANAGER_PORT
              value: "5001"
            - name: ANALYSIS_ORCHESTRATOR_HOST
              value: "analysis-orchestrator"
            - name: ANALYSIS_ORCHESTRATOR_PORT
              value: "5002"
            - name: INGESTION_SERVICE_HOST
              value: "ingestion-service"
            - name: INGESTION_SERVICE_PORT
              value: "5000"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health/liveness
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/v1/health/readiness
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: false


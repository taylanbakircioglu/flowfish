apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowfish
  namespace: {{OPENSHIFT_NAMESPACE}}
  annotations:
    route.openshift.io/termination: "edge"
    haproxy.router.openshift.io/timeout: 300s
spec:
  tls:
  - hosts:
      - {{FRONTEND_URL}}
    secretName: {{TLS_SECRET_NAME}}
  rules:
  - host: {{FRONTEND_URL}}
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000

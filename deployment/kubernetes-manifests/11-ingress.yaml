# Ingress for Flowfish (localhost by default)
# For local dev without TLS: remove the entire 'tls:' section and secretName
# For TLS: kubectl create secret tls flowfish-tls --cert=tls.crt --key=tls.key -n flowfish
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: flowfish
  namespace: flowfish
  annotations:
    route.openshift.io/termination: "edge"
    haproxy.router.openshift.io/timeout: 300s
spec:
  tls:
  - hosts:
      - localhost
    secretName: flowfish-tls
  rules:
  - host: localhost
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: backend
            port:
              number: 8000
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 3000

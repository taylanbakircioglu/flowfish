---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: flowfish
  labels:
    app: backend
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
    appProtocol: http
  selector:
    app: backend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: flowfish
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: backend
        version: v1.0.0
    spec:
      serviceAccountName: flowfish-backend
      securityContext:
        # OpenShift compatibility: Do not specify runAsNonRoot, runAsUser, fsGroup, seccompProfile
        # OpenShift SCC will enforce security policies automatically
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - backend
              topologyKey: kubernetes.io/hostname
      containers:
      - name: backend
        image: taylanbakircioglu/flowfish:backend-latest
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false  # FastAPI needs write for temp files
          capabilities:
            drop:
            - ALL
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        envFrom:
        - configMapRef:
            name: backend-config
        - secretRef:
            name: database-credentials
        - secretRef:
            name: app-secrets
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: secret-key
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flowfish-secrets
              key: NEO4J_PASSWORD
        # ClickHouse credentials from secret
        - name: CLICKHOUSE_USER
          valueFrom:
            secretKeyRef:
              name: flowfish-secrets
              key: clickhouse-user
        - name: CLICKHOUSE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: flowfish-secrets
              key: clickhouse-password
        # Encryption key for sensitive data (Fernet key for encrypting tokens, kubeconfigs)
        - name: FLOWFISH_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: flowfish-secrets
              key: FLOWFISH_ENCRYPTION_KEY
        # Change Detection - ClickHouse-only Architecture
        # NOTE: PostgreSQL change_events table removed. All events stored in ClickHouse.
        - name: RUN_BASED_FILTERING_ENABLED
          value: "true"
        livenessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /api/v1/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 5
        resources:
          requests:
            cpu: 1000m
            memory: 2Gi
          limits:
            cpu: 4000m
            memory: 6Gi
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: flowfish
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 1
  maxReplicas: 1
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Pods
        value: 1
        periodSeconds: 60
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: backend-pdb
  namespace: flowfish
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: backend


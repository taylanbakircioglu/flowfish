---
# Database Credentials
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: {{OPENSHIFT_NAMESPACE}}
  labels:
    app: database
type: Opaque
stringData:
  # PostgreSQL credentials
  postgres-user: {{POSTGRES_USER}}
  postgres-password: {{POSTGRES_PASSWORD}}
  postgres-database: flowfish
  
  # PostgreSQL connection URL
  url: postgresql://{{POSTGRES_USER}}:{{POSTGRES_PASSWORD}}@postgresql:5432/flowfish
  
  # ClickHouse credentials
  clickhouse-user: {{CLICKHOUSE_USER}}
  clickhouse-password: {{CLICKHOUSE_PASSWORD}}
  clickhouse-database: flowfish
  
  # Redis password
  redis-password: {{REDIS_PASSWORD}}
---
# Application Secrets
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{OPENSHIFT_NAMESPACE}}
  labels:
    app: backend
type: Opaque
stringData:
  # JWT secret key (change in production!)
  secret-key: "{{JWT_SECRET_KEY}}"
  
  # LLM API keys (optional for local dev)
  llm-openai-api-key: ""
  llm-anthropic-api-key: ""
  llm-azure-api-key: ""
  
  # External service API keys
  webhook-secret: "{{WEBHOOK_SECRET}}"
---
# RabbitMQ Secrets
apiVersion: v1
kind: Secret
metadata:
  name: flowfish-secrets
  namespace: {{OPENSHIFT_NAMESPACE}}
  labels:
    app: flowfish
type: Opaque
stringData:
  # PostgreSQL credentials (for microservices)
  postgres-user: {{POSTGRES_USER}}
  postgres-password: {{POSTGRES_PASSWORD}}
  
  # ClickHouse credentials (for microservices)
  clickhouse-user: {{CLICKHOUSE_USER}}
  clickhouse-password: {{CLICKHOUSE_PASSWORD}}
  
  # RabbitMQ credentials
  rabbitmq-user: {{RABBITMQ_USER}}
  rabbitmq-password: {{RABBITMQ_PASSWORD}}
  rabbitmq-username: {{RABBITMQ_USER}}
  rabbitmq-erlang-cookie: {{RABBITMQ_ERLANG_COOKIE}}
  
  # JWT secret for API Gateway
  jwt-secret: "{{JWT_SECRET_KEY}}"
  
  # Neo4j credentials
  NEO4J_AUTH: "neo4j/{{NEO4J_PASSWORD}}"  # For Neo4j container (username/password format)
  NEO4J_PASSWORD: "{{NEO4J_PASSWORD}}"     # For microservices (password only)
  
  # Encryption key for sensitive data (tokens, kubeconfigs, etc.)
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  FLOWFISH_ENCRYPTION_KEY: "{{FLOWFISH_ENCRYPTION_KEY}}"
---
# TLS Secret - MUST BE CREATED MANUALLY
# The TLS certificate secret is NOT created by this manifest.
# Create it manually in OpenShift:
#
# oc create secret tls {{TLS_SECRET_NAME}} \
#   --cert=path/to/tls.crt \
#   --key=path/to/tls.key \
#   -n {{OPENSHIFT_NAMESPACE}}
#
# Or use existing wildcard certificate from your certificate manager

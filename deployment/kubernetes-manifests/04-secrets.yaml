---
# Database Credentials
apiVersion: v1
kind: Secret
metadata:
  name: database-credentials
  namespace: flowfish
  labels:
    app: database
type: Opaque
stringData:
  # PostgreSQL credentials (change in production!)
  postgres-user: flowfish
  postgres-password: flowfish123
  postgres-database: flowfish
  
  # PostgreSQL connection URL
  url: postgresql://flowfish:flowfish123@postgresql:5432/flowfish
  
  # ClickHouse credentials
  clickhouse-user: flowfish
  clickhouse-password: flowfish123
  clickhouse-database: flowfish
  
  # Redis password
  redis-password: flowfish123
---
# Application Secrets
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: flowfish
  labels:
    app: backend
type: Opaque
stringData:
  # JWT secret key (change in production!)
  secret-key: "local-dev-secret-key"
  
  # LLM API keys (optional for local dev)
  llm-openai-api-key: ""
  llm-anthropic-api-key: ""
  llm-azure-api-key: ""
  
  # External service API keys
  webhook-secret: "flowfish-webhook-secret"
---
# RabbitMQ Secrets
apiVersion: v1
kind: Secret
metadata:
  name: flowfish-secrets
  namespace: flowfish
  labels:
    app: flowfish
type: Opaque
stringData:
  # PostgreSQL credentials (for microservices)
  postgres-user: flowfish
  postgres-password: flowfish123
  
  # ClickHouse credentials (for microservices)
  clickhouse-user: flowfish
  clickhouse-password: flowfish123
  
  # RabbitMQ credentials
  rabbitmq-user: flowfish
  rabbitmq-password: flowfish123
  rabbitmq-username: flowfish
  rabbitmq-erlang-cookie: flowfish-local-cookie
  
  # JWT secret for API Gateway
  jwt-secret: "local-dev-secret-key"
  
  # Neo4j credentials
  NEO4J_AUTH: "neo4j/flowfish123"  # For Neo4j container (username/password format)
  NEO4J_PASSWORD: "flowfish123"     # For microservices (password only)
  
  # Encryption key for sensitive data (tokens, kubeconfigs, etc.)
  # Generate with: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
  FLOWFISH_ENCRYPTION_KEY: "Zo6CfvKB6y4IIPMAUJermGJ7UQm8wgjnvuehRGKY-sA="
---
# TLS Secret - MUST BE CREATED MANUALLY
# The TLS certificate secret is NOT created by this manifest.
# Create it manually in OpenShift:
#
# oc create secret tls flowfish-tls \
#   --cert=path/to/tls.crt \
#   --key=path/to/tls.key \
#   -n flowfish
#
# Or use existing wildcard certificate from your certificate manager

---
apiVersion: v1
kind: Service
metadata:
  name: timeseries-query
  namespace: flowfish
  labels:
    app: timeseries-query
    component: query
    tier: microservices
spec:
  selector:
    app: timeseries-query
  ports:
    - name: http
      port: 8002
      targetPort: 8002
      protocol: TCP
      appProtocol: http
  type: ClusterIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeseries-query
  namespace: flowfish
  labels:
    app: timeseries-query
    component: query
    tier: microservices
spec:
  replicas: 2
  selector:
    matchLabels:
      app: timeseries-query
  template:
    metadata:
      labels:
        app: timeseries-query
        component: query
        tier: microservices
    spec:
      serviceAccountName: flowfish
      containers:
        - name: timeseries-query
          image: taylanbakircioglu/flowfish:timeseries-query-latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8002
              protocol: TCP
          env:
            - name: SERVICE_NAME
              value: "timeseries-query"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8002"
            - name: LOG_LEVEL
              value: "INFO"
            - name: CLICKHOUSE_HOST
              value: "clickhouse"
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: clickhouse-user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: flowfish-secrets
                  key: clickhouse-password
            - name: CLICKHOUSE_DATABASE
              value: "flowfish"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: false


# Inspektor Gadget DaemonSet and Service
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: inspektor-gadget
  namespace: flowfish
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: inspektor-gadget
  namespace: flowfish
  labels:
    app: inspektor-gadget
    k8s-app: inspektor-gadget
spec:
  selector:
    matchLabels:
      app: inspektor-gadget
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: inspektor-gadget
        k8s-app: gadget
      annotations:
        # NOTE: AppArmor annotation deprecated in K8s 1.30+, using securityContext.appArmorProfile instead
        prometheus.io/scrape: "true"
        prometheus.io/port: "2223"
        prometheus.io/path: "/metrics"
    spec:
      hostPID: true
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      serviceAccountName: inspektor-gadget
      nodeSelector:
        kubernetes.io/os: linux
      # Exclude master/control-plane/infra nodes (CSI storage not available)
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/control-plane
                operator: DoesNotExist
              - key: node-role.kubernetes.io/master
                operator: DoesNotExist
              - key: node-role.kubernetes.io/infra
                operator: DoesNotExist
      tolerations:
      - effect: NoSchedule
        operator: Exists
      - effect: NoExecute
        operator: Exists
      initContainers:
      - name: detect-runtime
        image: busybox:1.36
        command: ['sh', '-c']
        args:
        - |
          if [ -S /host/run/k3s/containerd/containerd.sock ]; then
            SOCKET="/run/k3s/containerd/containerd.sock"
            echo "Detected K3s/RKE2 containerd socket"
          elif [ -S /host/run/containerd/containerd.sock ]; then
            SOCKET="/run/containerd/containerd.sock"
            echo "Detected standard containerd socket"
          elif [ -S /host/var/snap/microk8s/common/run/containerd.sock ]; then
            SOCKET="/host/var/snap/microk8s/common/run/containerd.sock"
            echo "Detected MicroK8s containerd socket"
          else
            SOCKET="/run/containerd/containerd.sock"
            echo "WARNING: No containerd socket found at known paths, using default"
          fi
          echo "Using containerd socket: $SOCKET"
          sed "s|CONTAINERD_SOCKET_AUTO|$SOCKET|g" /config-template/config.yaml > /config-generated/config.yaml
        volumeMounts:
        - name: run
          mountPath: /host/run
          readOnly: true
        - name: var
          mountPath: /host/var
          readOnly: true
        - name: config
          mountPath: /config-template
          readOnly: true
        - name: config-generated
          mountPath: /config-generated
      containers:
      - name: gadget
        image: ghcr.io/inspektor-gadget/inspektor-gadget:v0.48.0
        imagePullPolicy: Always
        terminationMessagePolicy: FallbackToLogsOnError
        # NOTE: Only -serve flag, NO -service-host!
        # -service-host breaks kubectl gadget connectivity
        command:
        - /bin/gadgettracermanager
        - -serve
        lifecycle:
          preStop:
            exec:
              command:
              - /cleanup
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: GADGET_POD_UID
          valueFrom:
            fieldRef:
              fieldPath: metadata.uid
        - name: GADGET_IMAGE
          value: "ghcr.io/inspektor-gadget/inspektor-gadget"
        - name: HOST_ROOT
          value: "/host"
        - name: IG_EXPERIMENTAL
          value: "false"
        securityContext:
          readOnlyRootFilesystem: true
          # AppArmor profile - K8s 1.30+ format (replaces deprecated annotation)
          appArmorProfile:
            type: Unconfined
          seLinuxOptions:
            type: spc_t
          capabilities:
            drop:
            - ALL
            add:
            - SYS_ADMIN
            - SYSLOG
            - SYS_PTRACE
            - SYS_RESOURCE
            - IPC_LOCK
            - NET_RAW
            - NET_ADMIN
        startupProbe:
          exec:
            command:
            - /bin/gadgettracermanager
            - -liveness
          failureThreshold: 12
          periodSeconds: 5
        readinessProbe:
          exec:
            command:
            - /bin/gadgettracermanager
            - -liveness
          periodSeconds: 5
          timeoutSeconds: 2
        livenessProbe:
          exec:
            command:
            - /bin/gadgettracermanager
            - -liveness
          periodSeconds: 5
          timeoutSeconds: 2
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 12Gi
        volumeMounts:
        - name: bin
          mountPath: /host/bin
          readOnly: true
        - name: etc
          mountPath: /host/etc
        - name: opt
          mountPath: /host/opt
        - name: usr
          mountPath: /host/usr
          readOnly: true
        - name: run
          mountPath: /host/run
          readOnly: true
        - name: var
          mountPath: /host/var
          readOnly: true
        - name: proc
          mountPath: /host/proc
          readOnly: true
        - name: run
          mountPath: /run
        - name: debugfs
          mountPath: /sys/kernel/debug
        - name: cgroup
          mountPath: /sys/fs/cgroup
          readOnly: true
        - name: bpffs
          mountPath: /sys/fs/bpf
        - name: oci
          mountPath: /var/lib/ig
        - name: config-generated
          mountPath: /etc/ig
          readOnly: true
        - name: wasm-cache
          mountPath: /var/run/ig/wasm-cache
      volumes:
      - name: bin
        hostPath:
          path: /bin
      - name: etc
        hostPath:
          path: /etc
      - name: opt
        hostPath:
          path: /opt
      - name: usr
        hostPath:
          path: /usr
      - name: proc
        hostPath:
          path: /proc
      - name: run
        hostPath:
          path: /run
      - name: var
        hostPath:
          path: /var
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
      - name: bpffs
        hostPath:
          path: /sys/fs/bpf
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
      - name: oci
        emptyDir: {}
      - name: config
        configMap:
          name: inspektor-gadget-config
          defaultMode: 0400
      - name: config-generated
        emptyDir: {}
      - name: wasm-cache
        emptyDir: {}
---
# NOTE: This ClusterIP service is optional for in-cluster deployments.
# kubectl gadget connects via Kubernetes API, not this service.
# For remote cluster access, a separate LoadBalancer service is needed.
apiVersion: v1
kind: Service
metadata:
  name: inspektor-gadget
  namespace: flowfish
  labels:
    app: inspektor-gadget
spec:
  type: ClusterIP
  ports:
  - name: grpc
    port: 16060
    targetPort: 16060
    protocol: TCP
  selector:
    app: inspektor-gadget

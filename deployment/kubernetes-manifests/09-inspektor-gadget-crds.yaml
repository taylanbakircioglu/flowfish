---
# Inspektor Gadget Trace CRD
# This CRD is required for Inspektor Gadget to manage traces
#
# Apply this BEFORE deploying Inspektor Gadget:
#   oc apply -f 09-inspektor-gadget-crds.yaml
#
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: traces.gadget.kinvolk.io
  annotations:
    controller-gen.kubebuilder.io/version: v0.9.2
spec:
  group: gadget.kinvolk.io
  names:
    kind: Trace
    listKind: TraceList
    plural: traces
    singular: trace
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Trace is the Schema for the traces API
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: TraceSpec defines the desired state of Trace
            properties:
              filter:
                description: Filter is used to filter events
                properties:
                  containerName:
                    description: ContainerName is the name of the container to trace
                    type: string
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels is a map of labels to filter by
                    type: object
                  namespace:
                    description: Namespace is the namespace to trace
                    type: string
                  podname:
                    description: Podname is the name of the pod to trace
                    type: string
                type: object
              gadget:
                description: Gadget is the name of the gadget to trace
                type: string
              node:
                description: Node is the name of the node to run the gadget on
                type: string
              output:
                description: Output defines the output configuration
                properties:
                  mode:
                    description: Mode defines output mode (e.g., "Stream", "Status")
                    type: string
                type: object
              parameters:
                additionalProperties:
                  type: string
                description: Parameters contains gadget-specific parameters
                type: object
              runMode:
                description: RunMode defines how the gadget should run
                type: string
            required:
            - gadget
            type: object
          status:
            description: TraceStatus defines the observed state of Trace
            properties:
              operationError:
                description: OperationError is the error message if operation failed
                type: string
              operationWarning:
                description: OperationWarning contains any warnings during operation
                type: string
              output:
                description: Output is the output of the trace
                type: string
              state:
                description: State represents the state of the trace
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}


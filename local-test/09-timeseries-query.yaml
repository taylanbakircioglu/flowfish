---
apiVersion: v1
kind: Service
metadata:
  name: timeseries-query
  namespace: flowfish-local
spec:
  type: ClusterIP
  ports:
    - port: 8002
      targetPort: 8002
      name: http
  selector:
    app: timeseries-query
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: timeseries-query
  namespace: flowfish-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timeseries-query
  template:
    metadata:
      labels:
        app: timeseries-query
    spec:
      containers:
        - name: timeseries-query
          image: taylanbakircioglu/flowfish:timeseries-query-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8002
          env:
            - name: SERVICE_NAME
              value: timeseries-query
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8002"
            - name: LOG_LEVEL
              value: INFO
            - name: CLICKHOUSE_HOST
              value: clickhouse
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_USER
              value: flowfish
            - name: CLICKHOUSE_PASSWORD
              value: flowfish123
            - name: CLICKHOUSE_DATABASE
              value: flowfish
          readinessProbe:
            httpGet:
              path: /ready
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10

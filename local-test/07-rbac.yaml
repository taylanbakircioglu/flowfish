---
# ServiceAccount for cluster-manager
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flowfish-cluster-manager
  namespace: flowfish-local
  labels:
    app: cluster-manager

---
# ClusterRole - read access to cluster resources (nodes, pods, namespaces, etc.)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: flowfish-cluster-reader
  labels:
    app: cluster-manager
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - namespaces
      - pods
      - pods/log
      - services
      - events
      - configmaps
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list", "watch"]
  - apiGroups: ["gadget.kinvolk.io"]
    resources:
      - traces
    verbs: ["get", "list", "watch", "create", "delete"]

---
# ClusterRoleBinding - bind the role to the ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: flowfish-cluster-reader-binding
  labels:
    app: cluster-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: flowfish-cluster-reader
subjects:
  - kind: ServiceAccount
    name: flowfish-cluster-manager
    namespace: flowfish-local

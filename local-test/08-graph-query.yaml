---
apiVersion: v1
kind: Service
metadata:
  name: graph-query
  namespace: flowfish-local
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      name: http
  selector:
    app: graph-query
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graph-query
  namespace: flowfish-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: graph-query
  template:
    metadata:
      labels:
        app: graph-query
    spec:
      containers:
        - name: graph-query
          image: taylanbakircioglu/flowfish:graph-query-latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8001
          env:
            - name: SERVICE_NAME
              value: graph-query
            - name: HOST
              value: 0.0.0.0
            - name: PORT
              value: "8001"
            - name: LOG_LEVEL
              value: INFO
            - name: NEO4J_BOLT_URI
              value: bolt://neo4j:7687
            - name: NEO4J_HTTP_URI
              value: http://neo4j:7474
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              value: flowfish123
            - name: NEO4J_DATABASE
              value: neo4j
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10

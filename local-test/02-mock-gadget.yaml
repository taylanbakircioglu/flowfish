---
# Mock Inspector Gadget gRPC Service
apiVersion: v1
kind: ConfigMap
metadata:
  name: mock-gadget-code
  namespace: flowfish-local
data:
  server.py: |
    """Mock Inspector Gadget gRPC Server"""
    import grpc
    from concurrent import futures
    import time
    import logging
    import os
    
    from grpc_health.v1 import health_pb2, health_pb2_grpc
    from grpc_health.v1.health import HealthServicer
    
    logging.basicConfig(level=logging.INFO, format='%(asctime)s - %(levelname)s - %(message)s')
    logger = logging.getLogger('mock-gadget')
    
    def serve():
        port = os.environ.get('GRPC_PORT', '16060')
        server = grpc.server(futures.ThreadPoolExecutor(max_workers=10))
        
        # Add health service
        health_servicer = HealthServicer()
        health_pb2_grpc.add_HealthServicer_to_server(health_servicer, server)
        health_servicer.set('', health_pb2.HealthCheckResponse.SERVING)
        health_servicer.set('inspektor-gadget', health_pb2.HealthCheckResponse.SERVING)
        
        server.add_insecure_port(f'[::]:{port}')
        server.start()
        
        logger.info(f"🚀 Mock Inspector Gadget gRPC server started on port {port}")
        logger.info(f"   Health check available at grpc://localhost:{port}")
        
        try:
            while True:
                time.sleep(86400)
        except KeyboardInterrupt:
            server.stop(0)
    
    if __name__ == '__main__':
        serve()
---
apiVersion: v1
kind: Service
metadata:
  name: mock-gadget
  namespace: flowfish-local
  labels:
    app: mock-gadget
spec:
  ports:
    - name: grpc
      port: 16060
      targetPort: 16060
  selector:
    app: mock-gadget
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-gadget
  namespace: flowfish-local
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-gadget
  template:
    metadata:
      labels:
        app: mock-gadget
    spec:
      containers:
        - name: mock-gadget
          image: python:3.11-slim
          command:
            - /bin/sh
            - -c
            - |
              pip install grpcio grpcio-health-checking --quiet
              python /app/server.py
          ports:
            - containerPort: 16060
          env:
            - name: GRPC_PORT
              value: "16060"
          volumeMounts:
            - name: code
              mountPath: /app
          readinessProbe:
            exec:
              command:
                - python
                - -c
                - "import grpc; ch=grpc.insecure_channel('localhost:16060'); grpc.channel_ready_future(ch).result(timeout=5)"
            initialDelaySeconds: 30
            periodSeconds: 10
      volumes:
        - name: code
          configMap:
            name: mock-gadget-code


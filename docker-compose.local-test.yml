version: '3.8'

# Local Test Environment with Mock Inspector Gadget
# Usage: docker-compose -f docker-compose.local-test.yml up -d

services:
  # ============================================================================
  # DATABASES
  # ============================================================================
  
  postgres:
    image: postgres:15-alpine
    container_name: flowfish-postgres
    environment:
      POSTGRES_USER: flowfish
      POSTGRES_PASSWORD: flowfish123
      POSTGRES_DB: flowfish
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowfish"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flowfish-network

  redis:
    image: redis:7-alpine
    container_name: flowfish-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - flowfish-network

  neo4j:
    image: neo4j:5.15-community
    container_name: flowfish-neo4j
    environment:
      NEO4J_AUTH: neo4j/flowfish123
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - flowfish-network

  # ============================================================================
  # MOCK INSPECTOR GADGET
  # ============================================================================
  
  mock-gadget:
    build:
      context: ./mocks/gadget-mock
      dockerfile: Dockerfile
    container_name: flowfish-mock-gadget
    environment:
      GRPC_PORT: "16060"
    ports:
      - "16060:16060"
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:16060'); grpc.channel_ready_future(ch).result(timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - flowfish-network

  # ============================================================================
  # BACKEND
  # ============================================================================
  
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: flowfish-backend
    environment:
      # Database connections
      DATABASE_URL: postgresql+asyncpg://flowfish:flowfish123@postgres:5432/flowfish
      REDIS_URL: redis://:redis123@redis:6379/0
      NEO4J_BOLT_URI: bolt://neo4j:7687
      NEO4J_HTTP_URI: http://neo4j:7474
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: flowfish123
      NEO4J_DATABASE: neo4j
      
      # Application settings
      SECRET_KEY: local-dev-secret-key
      JWT_EXPIRATION_HOURS: 24
      CORS_ORIGINS: http://localhost:3000
      LOG_LEVEL: DEBUG
      
      # Local gadget
      LOCAL_GADGET_ENDPOINT: mock-gadget:16060
      
      # Cluster Manager gRPC endpoint
      CLUSTER_MANAGER_GRPC: cluster-manager:5001
      
      # Encryption key for cluster credentials (shared with cluster-manager)
      FLOWFISH_ENCRYPTION_KEY: "Zo6CfvKB6y4IIPMAUJermGJ7UQm8wgjnvuehRGKY-sA="
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      mock-gadget:
        condition: service_healthy
      cluster-manager:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - flowfish-network

  # ============================================================================
  # CLUSTER MANAGER (gRPC gateway for Kubernetes API access)
  # ============================================================================
  
  cluster-manager:
    image: taylanbakircioglu/flowfish:cluster-manager-latest
    container_name: flowfish-cluster-manager
    environment:
      SERVICE_NAME: cluster-manager
      GRPC_PORT: "5001"
      DATABASE_URL: postgresql://flowfish:flowfish123@postgres:5432/flowfish
      REDIS_URL: redis://:redis123@redis:6379/0
      LOG_LEVEL: DEBUG
      FLOWFISH_ENCRYPTION_KEY: "Zo6CfvKB6y4IIPMAUJermGJ7UQm8wgjnvuehRGKY-sA="
    ports:
      - "5001:5001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:5001'); ch.close()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - flowfish-network

  # ============================================================================
  # DATABASE MIGRATIONS
  # ============================================================================
  
  migrations:
    image: postgres:15-alpine
    container_name: flowfish-migrations
    environment:
      PGPASSWORD: flowfish123
    command: |
      sh -c '
        echo "Waiting for PostgreSQL..."
        until pg_isready -h postgres -U flowfish; do sleep 2; done
        echo "Running migrations..."
        
        psql -h postgres -U flowfish -d flowfish << EOSQL
        
        -- Create clusters table
        CREATE TABLE IF NOT EXISTS clusters (
            id SERIAL PRIMARY KEY,
            name VARCHAR(255) NOT NULL UNIQUE,
            description TEXT,
            environment VARCHAR(50) NOT NULL DEFAULT '"'"'production'"'"',
            provider VARCHAR(50) NOT NULL DEFAULT '"'"'kubernetes'"'"',
            region VARCHAR(100),
            tags JSONB DEFAULT '"'"'{}'"'"',
            connection_type VARCHAR(50) NOT NULL,
            api_server_url VARCHAR(500),
            kubeconfig_encrypted TEXT,
            ca_cert_encrypted TEXT,
            token_encrypted TEXT,
            skip_tls_verify BOOLEAN DEFAULT FALSE,
            gadget_endpoint VARCHAR(500),
            gadget_protocol VARCHAR(50) DEFAULT '"'"'grpc'"'"',
            gadget_auto_detect BOOLEAN DEFAULT TRUE,
            gadget_version VARCHAR(50),
            gadget_capabilities JSONB DEFAULT '"'"'[]'"'"',
            gadget_health_status VARCHAR(50) DEFAULT '"'"'unknown'"'"',
            gadget_last_check TIMESTAMP WITH TIME ZONE,
            status VARCHAR(50) DEFAULT '"'"'active'"'"',
            validation_status JSONB,
            last_sync TIMESTAMP WITH TIME ZONE,
            error_message TEXT,
            total_namespaces INTEGER DEFAULT 0,
            total_pods INTEGER DEFAULT 0,
            total_nodes INTEGER DEFAULT 0,
            k8s_version VARCHAR(50),
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            created_by INTEGER,
            updated_by INTEGER
        );
        
        -- Create namespaces table
        CREATE TABLE IF NOT EXISTS namespaces (
            id SERIAL PRIMARY KEY,
            cluster_id INTEGER NOT NULL REFERENCES clusters(id) ON DELETE CASCADE,
            name VARCHAR(255) NOT NULL,
            uid VARCHAR(255),
            labels JSONB DEFAULT '"'"'{}'"'"',
            annotations JSONB DEFAULT '"'"'{}'"'"',
            status VARCHAR(50) DEFAULT '"'"'Active'"'"',
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            UNIQUE(cluster_id, name)
        );
        
        -- Create workloads table
        CREATE TABLE IF NOT EXISTS workloads (
            id SERIAL PRIMARY KEY,
            cluster_id INTEGER NOT NULL REFERENCES clusters(id) ON DELETE CASCADE,
            namespace_id INTEGER NOT NULL REFERENCES namespaces(id) ON DELETE CASCADE,
            name VARCHAR(255) NOT NULL,
            workload_type VARCHAR(50) NOT NULL,
            uid VARCHAR(255),
            labels JSONB DEFAULT '"'"'{}'"'"',
            annotations JSONB DEFAULT '"'"'{}'"'"',
            replicas INTEGER,
            available_replicas INTEGER,
            image VARCHAR(500),
            status VARCHAR(50) DEFAULT '"'"'Unknown'"'"',
            is_active BOOLEAN DEFAULT TRUE,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            UNIQUE(cluster_id, namespace_id, workload_type, name)
        );
        
        -- Create analyses table
        CREATE TABLE IF NOT EXISTS analyses (
            id SERIAL PRIMARY KEY,
            name VARCHAR(255) NOT NULL,
            description TEXT,
            cluster_id INTEGER REFERENCES clusters(id),
            scope_type VARCHAR(50),
            scope_config JSONB DEFAULT '"'"'{}'"'"',
            event_types JSONB DEFAULT '"'"'[]'"'"',
            time_config JSONB DEFAULT '"'"'{}'"'"',
            output_config JSONB DEFAULT '"'"'{}'"'"',
            status VARCHAR(50) DEFAULT '"'"'pending'"'"',
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
            started_at TIMESTAMP WITH TIME ZONE,
            completed_at TIMESTAMP WITH TIME ZONE,
            error_message TEXT,
            created_by INTEGER
        );
        
        -- Create users table  
        CREATE TABLE IF NOT EXISTS users (
            id SERIAL PRIMARY KEY,
            username VARCHAR(255) NOT NULL UNIQUE,
            email VARCHAR(255) NOT NULL UNIQUE,
            password_hash VARCHAR(255) NOT NULL,
            role VARCHAR(50) DEFAULT '"'"'viewer'"'"',
            is_active BOOLEAN DEFAULT TRUE,
            created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
        );
        
        -- Insert default admin user
        INSERT INTO users (username, email, password_hash, role)
        VALUES ('"'"'admin'"'"', '"'"'admin@flowfish.local'"'"', '"'"'\$2b\$12\$t.gxj5CSj1Bcrf7VyZEQqO0PNUJnwKvwiY5W1xQ0hFMDrjpVYN3.u'"'"', '"'"'admin'"'"')
        ON CONFLICT (username) DO NOTHING;
        
        EOSQL
        
        echo "Migrations completed!"
      '
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flowfish-network

# ============================================================================
# VOLUMES & NETWORKS
# ============================================================================

volumes:
  postgres_data:

networks:
  flowfish-network:
    driver: bridge


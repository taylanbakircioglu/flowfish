syntax = "proto3";

package flowfish.gadget;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

// =============================================================================
// INSPEKTOR GADGET TRACE SERVICE
// Interface for controlling eBPF traces on Inspector Gadget
// =============================================================================

service GadgetTraceService {
    // Start a new trace
    rpc StartTrace(StartTraceRequest) returns (StartTraceResponse);
    
    // Stop an active trace
    rpc StopTrace(StopTraceRequest) returns (StopTraceResponse);
    
    // Stream events from a trace
    rpc StreamEvents(StreamEventsRequest) returns (stream GadgetEvent);
    
    // Get trace status
    rpc GetTraceStatus(GetTraceStatusRequest) returns (TraceStatus);
    
    // List active traces
    rpc ListTraces(ListTracesRequest) returns (ListTracesResponse);
    
    // Health check
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
    
    // Get available gadgets
    rpc ListGadgets(ListGadgetsRequest) returns (ListGadgetsResponse);
}

// =============================================================================
// TRACE CONTROL
// =============================================================================

message StartTraceRequest {
    string trace_id = 1; // Unique identifier (generated by caller)
    string gadget_name = 2; // trace_network, trace_dns, trace_tcp, etc.
    
    // Scope filters
    TraceScope scope = 3;
    
    // Gadget-specific parameters
    map<string, string> parameters = 4;
    
    // Output configuration
    OutputConfig output = 5;
    
    // Metadata
    string analysis_id = 6;
    string cluster_id = 7;
}

message TraceScope {
    // Filter by namespace (empty = all)
    repeated string namespaces = 1;
    
    // Filter by pod name (supports glob patterns)
    repeated string pod_names = 2;
    
    // Filter by container name
    repeated string container_names = 3;
    
    // Filter by labels (key=value)
    map<string, string> labels = 4;
    
    // Filter by node
    repeated string nodes = 5;
    
    // Host network mode
    bool include_host_network = 6;
}

message OutputConfig {
    // Output format
    string format = 1; // json, columns, yaml
    
    // Fields to include (empty = all)
    repeated string fields = 2;
    
    // Maximum events per second (0 = unlimited)
    uint32 rate_limit = 3;
    
    // Event sampling rate (1-100, 100 = all events)
    uint32 sampling_rate = 4;
}

message StartTraceResponse {
    string trace_id = 1;
    string status = 2; // started, pending, failed
    string message = 3;
    google.protobuf.Timestamp started_at = 4;
}

message StopTraceRequest {
    string trace_id = 1;
}

message StopTraceResponse {
    string trace_id = 1;
    bool success = 2;
    string message = 3;
    TraceStats stats = 4;
}

message TraceStats {
    uint64 events_collected = 1;
    uint64 bytes_processed = 2;
    uint64 events_dropped = 3;
    uint32 duration_seconds = 4;
}

// =============================================================================
// EVENT STREAMING
// =============================================================================

message StreamEventsRequest {
    string trace_id = 1;
    
    // Optional filters for streaming
    EventFilters filters = 2;
    
    // Buffer size
    uint32 buffer_size = 3;
}

message EventFilters {
    // Port filter
    repeated uint32 ports = 1;
    
    // Protocol filter
    repeated string protocols = 2;
    
    // IP filter
    repeated string ips = 3;
}

message GadgetEvent {
    // Event metadata
    string event_id = 1;
    string trace_id = 2;
    google.protobuf.Timestamp timestamp = 3;
    string gadget_name = 4;
    
    // Kubernetes context
    K8sContext k8s = 5;
    
    // Event type specific data
    oneof event_data {
        NetworkEvent network = 10;
        DNSEvent dns = 11;
        TCPEvent tcp = 12;
        ProcessEvent process = 13;
        FileEvent file = 14;
        SecurityEvent security = 15;
    }
    
    // Raw JSON for unknown/custom events
    string raw_json = 20;
}

message K8sContext {
    string node = 1;
    string namespace = 2;
    string pod = 3;
    string container = 4;
    string container_id = 5;
    map<string, string> labels = 6;
}

// Network event (trace_network, socket)
message NetworkEvent {
    // Source
    string src_ip = 1;
    uint32 src_port = 2;
    string src_endpoint = 3; // resolved hostname/service
    
    // Destination
    string dst_ip = 4;
    uint32 dst_port = 5;
    string dst_endpoint = 6;
    
    // Connection info
    string protocol = 7; // TCP, UDP, ICMP
    string direction = 8; // inbound, outbound
    string state = 9; // connect, accept, close
    
    // Metrics
    uint64 bytes_sent = 10;
    uint64 bytes_received = 11;
    uint32 packets = 12;
    float latency_ms = 13;
    
    // Process info
    uint32 pid = 14;
    string comm = 15;
}

// DNS event (trace_dns)
message DNSEvent {
    string query_name = 1;
    string query_type = 2; // A, AAAA, CNAME, etc.
    string query_class = 3;
    
    string response_code = 4; // NOERROR, NXDOMAIN, etc.
    repeated string answers = 5;
    uint32 ttl = 6;
    
    float latency_ms = 7;
    
    string dns_server = 8;
    
    // Process info
    uint32 pid = 9;
    string comm = 10;
}

// TCP event (trace_tcp)
message TCPEvent {
    string src_ip = 1;
    uint32 src_port = 2;
    string dst_ip = 3;
    uint32 dst_port = 4;
    
    string old_state = 5;
    string new_state = 6;
    
    // Metrics
    float srtt_us = 7; // Smoothed RTT
    uint32 retransmits = 8;
    
    // Process info
    uint32 pid = 9;
    string comm = 10;
}

// Process event (trace_exec, trace_signal)
message ProcessEvent {
    uint32 pid = 1;
    uint32 ppid = 2;
    uint32 uid = 3;
    uint32 gid = 4;
    
    string comm = 5;
    string exe = 6;
    repeated string args = 7;
    string cwd = 8;
    
    string event_type = 9; // exec, exit, signal
    int32 exit_code = 10;
    int32 signal = 11;
}

// File event (trace_open, trace_write)
message FileEvent {
    string path = 1;
    string operation = 2; // open, read, write, close
    string flags = 3;
    uint32 mode = 4;
    
    uint64 bytes = 5;
    uint32 duration_us = 6;
    
    int32 error = 7;
    
    // Process info
    uint32 pid = 8;
    string comm = 9;
}

// Security event (trace_capabilities, seccomp)
message SecurityEvent {
    string event_type = 1; // capability, seccomp, selinux
    
    // Capability check
    string capability = 2;
    string syscall = 3;
    string verdict = 4; // allow, deny
    
    // Process info
    uint32 pid = 5;
    string comm = 6;
    uint32 uid = 7;
}

// =============================================================================
// TRACE STATUS & MANAGEMENT
// =============================================================================

message GetTraceStatusRequest {
    string trace_id = 1;
}

message TraceStatus {
    string trace_id = 1;
    string gadget_name = 2;
    string status = 3; // running, stopped, failed
    google.protobuf.Timestamp started_at = 4;
    google.protobuf.Timestamp stopped_at = 5;
    TraceStats stats = 6;
    string error_message = 7;
}

message ListTracesRequest {
    // Optional filters
    string analysis_id = 1;
    string status = 2;
}

message ListTracesResponse {
    repeated TraceStatus traces = 1;
}

// =============================================================================
// HEALTH & CAPABILITIES
// =============================================================================

message HealthCheckRequest {}

message HealthCheckResponse {
    bool healthy = 1;
    string version = 2;
    string message = 3;
    
    // Node info
    repeated NodeInfo nodes = 4;
    
    // Capabilities
    repeated string available_gadgets = 5;
}

message NodeInfo {
    string name = 1;
    bool ready = 2;
    string kernel_version = 3;
    bool ebpf_supported = 4;
}

message ListGadgetsRequest {}

message ListGadgetsResponse {
    repeated GadgetInfo gadgets = 1;
}

message GadgetInfo {
    string name = 1;
    string display_name = 2;
    string description = 3;
    string category = 4; // network, trace, snapshot, profile
    repeated GadgetParameter parameters = 5;
    repeated string output_fields = 6;
}

message GadgetParameter {
    string name = 1;
    string description = 2;
    string type = 3; // string, int, bool, enum
    bool required = 4;
    string default_value = 5;
    repeated string enum_values = 6;
}

